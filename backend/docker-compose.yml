services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres/init-multi-db.sql:/docker-entrypoint-initdb.d/001-init-multi-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${USER_AVATAR_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${USER_AVATAR_STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  user:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: user
        CMD_PATH: ./cmd/userd
    env_file:
      - .env
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  auth:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: auth
        CMD_PATH: ./cmd/authd
    env_file:
      - .env
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      user:
        condition: service_started

  job:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: job
        CMD_PATH: ./cmd/jobd
    env_file:
      - .env
    ports:
      - "50053:50053"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  proposal:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: proposal
        CMD_PATH: ./cmd/proposald
    env_file:
      - .env
    ports:
      - "50054:50054"
    depends_on:
      postgres:
        condition: service_healthy
      job:
        condition: service_started
      connects:
        condition: service_started
      minio:
        condition: service_healthy

  connects:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: connects
        CMD_PATH: ./cmd/connectsd
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  contract:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: contract
        CMD_PATH: ./cmd/contractd
    env_file:
      - .env
    ports:
      - "50055:50055"
    depends_on:
      postgres:
        condition: service_healthy
      proposal:
        condition: service_started

  wallet:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: wallet
        CMD_PATH: ./cmd/walletd
    env_file:
      - .env
    ports:
      - "50059:50059"
    depends_on:
      postgres:
        condition: service_healthy
  chat:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: chat
        CMD_PATH: ./cmd/chatd
    env_file:
      - .env
    ports:
      - "50063:50060"
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  verification:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: verification
        CMD_PATH: ./cmd/verificationd
    env_file:
      - .env
    ports:
      - "51062:50060"
    depends_on:
      postgres:
        condition: service_healthy

  payment:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: payment
        CMD_PATH: ./cmd/paymentd
    env_file:
      - .env
    ports:
      - "51061:50061"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      wallet:
        condition: service_started
      contract:
        condition: service_started
      verification:
        condition: service_started

  recommendation:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: recommendation
        CMD_PATH: ./cmd/recommendationd
    env_file:
      - .env
    ports:
      - "50064:50064"
    depends_on:
      user:
        condition: service_started
      job:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      auth:
        condition: service_started
      user:
        condition: service_started
      verification:
        condition: service_started
      payment:
        condition: service_started
      recommendation:
        condition: service_started

volumes:
  postgres-data:
  minio-data:
