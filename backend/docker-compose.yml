services:
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: jobconnect_auth
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d jobconnect_auth"]
      interval: 5s
      timeout: 5s
      retries: 20

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: jobconnect_user
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d jobconnect_user"]
      interval: 5s
      timeout: 5s
      retries: 20

  job-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: job
      POSTGRES_PASSWORD: job
      POSTGRES_DB: jobconnect_job
    ports:
      - "5434:5432"
    volumes:
      - job-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job -d jobconnect_job"]
      interval: 5s
      timeout: 5s
      retries: 20

  proposal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: proposal
      POSTGRES_PASSWORD: proposal
      POSTGRES_DB: jobconnect_proposal
    ports:
      - "5435:5432"
    volumes:
      - proposal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proposal -d jobconnect_proposal"]
      interval: 5s
      timeout: 5s
      retries: 20

  contract-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: contract
      POSTGRES_PASSWORD: contract
      POSTGRES_DB: jobconnect_contract
    ports:
      - "5436:5432"
    volumes:
      - contract-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contract -d jobconnect_contract"]
      interval: 5s
      timeout: 5s
      retries: 20

  wallet-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB: jobconnect_wallet
    ports:
      - "5437:5432"
    volumes:
      - wallet-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d jobconnect_wallet"]
      interval: 5s
      timeout: 5s
      retries: 20

  chat-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: jobconnect_chat
    ports:
      - "5438:5432"
    volumes:
      - chat-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d jobconnect_chat"]
  verification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: verification
      POSTGRES_PASSWORD: verification
      POSTGRES_DB: jobconnect_verification
    ports:
      - "5440:5432"
    volumes:
      - verification-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U verification -d jobconnect_verification"]
      interval: 5s
      timeout: 5s
      retries: 20

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
      POSTGRES_DB: jobconnect_payment
    ports:
      - "5439:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d jobconnect_payment"]
      interval: 5s
      timeout: 5s
      retries: 20

  connects-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: connects
      POSTGRES_PASSWORD: connects
      POSTGRES_DB: jobconnect_connects
    ports:
      - "5441:5432"
    volumes:
      - connects-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connects -d jobconnect_connects"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${USER_AVATAR_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${USER_AVATAR_STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  user:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: user
        CMD_PATH: ./cmd/userd
    env_file:
      - .env
    ports:
      - "50052:50052"
    depends_on:
      user-db:
        condition: service_healthy
      minio:
        condition: service_healthy

  auth:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: auth
        CMD_PATH: ./cmd/authd
    env_file:
      - .env
    ports:
      - "50051:50051"
    depends_on:
      auth-db:
        condition: service_healthy
      user:
        condition: service_started

  job:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: job
        CMD_PATH: ./cmd/jobd
    env_file:
      - .env
    ports:
      - "50053:50053"
    depends_on:
      job-db:
        condition: service_healthy
      minio:
        condition: service_healthy

  proposal:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: proposal
        CMD_PATH: ./cmd/proposald
    env_file:
      - .env
    ports:
      - "50054:50054"
    depends_on:
      proposal-db:
        condition: service_healthy
      job:
        condition: service_started
      connects:
        condition: service_started
      minio:
        condition: service_healthy

  connects:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: connects
        CMD_PATH: ./cmd/connectsd
    env_file:
      - .env
    depends_on:
      connects-db:
        condition: service_healthy

  contract:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: contract
        CMD_PATH: ./cmd/contractd
    env_file:
      - .env
    ports:
      - "50055:50055"
    depends_on:
      contract-db:
        condition: service_healthy
      proposal:
        condition: service_started

  wallet:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: wallet
        CMD_PATH: ./cmd/walletd
    env_file:
      - .env
    ports:
      - "50059:50059"
    depends_on:
      wallet-db:
        condition: service_healthy
  chat:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: chat
        CMD_PATH: ./cmd/chatd
    env_file:
      - .env
    ports:
      - "50063:50060"
      - "8081:8080"
    depends_on:
      chat-db:
        condition: service_healthy

  verification:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: verification
        CMD_PATH: ./cmd/verificationd
    env_file:
      - .env
    ports:
      - "51062:50060"
    depends_on:
      verification-db:
        condition: service_healthy

  payment:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: payment
        CMD_PATH: ./cmd/paymentd
    env_file:
      - .env
    ports:
      - "51061:50061"
      - "8081:8081"
    depends_on:
      payment-db:
        condition: service_healthy
      minio:
        condition: service_healthy
      wallet:
        condition: service_started
      contract:
        condition: service_started
      verification:
        condition: service_started

  recommendation:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE: recommendation
        CMD_PATH: ./cmd/recommendationd
    env_file:
      - .env
    ports:
      - "50064:50064"
    depends_on:
      user:
        condition: service_started
      job:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      auth:
        condition: service_started
      user:
        condition: service_started
      verification:
        condition: service_started
      payment:
        condition: service_started
      recommendation:
        condition: service_started

volumes:
  auth-db-data:
  user-db-data:
  job-db-data:
  proposal-db-data:
  contract-db-data:
  wallet-db-data:
  chat-db-data:
  verification-db-data:
  payment-db-data:
  connects-db-data:
  minio-data:
