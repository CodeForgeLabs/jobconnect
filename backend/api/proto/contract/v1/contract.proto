syntax = "proto3";

package contract.v1;

option go_package = "jobconnect/contract/gen/contract/v1;contractv1";

service ContractService {
  rpc CreateContract(CreateContractRequest) returns (CreateContractResponse);
  rpc GetContract(GetContractRequest) returns (GetContractResponse);
  rpc ListMyContracts(ListMyContractsRequest) returns (ListMyContractsResponse);
  // Internal RPC for job-service hiring decisions.
  rpc InternalGetJobOfferState(GetJobOfferStateRequest) returns (GetJobOfferStateResponse);

  // Accepting the offer activates the contract and finalizes the hire.
  rpc AcceptContract(AcceptContractRequest) returns (AcceptContractResponse);
  rpc DeclineContract(DeclineContractRequest) returns (DeclineContractResponse);
  rpc RevokeContractOffer(RevokeContractOfferRequest) returns (RevokeContractOfferResponse);

  // Freelancer submits completed work artifacts for a milestone.
  rpc SubmitMilestoneWork(SubmitMilestoneWorkRequest) returns (SubmitMilestoneWorkResponse);
  // Client requests revisions on a submitted milestone.
  rpc RequestMilestoneChanges(RequestMilestoneChangesRequest) returns (RequestMilestoneChangesResponse);
  // Client approves a submitted milestone and triggers settlement orchestration.
  rpc ApproveMilestoneSubmission(ApproveMilestoneSubmissionRequest) returns (ApproveMilestoneSubmissionResponse);
  // Internal RPC for payment-service escrow funding callbacks.
  rpc InternalMarkMilestoneFunded(InternalMarkMilestoneFundedRequest) returns (InternalMarkMilestoneFundedResponse);

  rpc LogHourlyWork(LogHourlyWorkRequest) returns (LogHourlyWorkResponse);
  rpc GetHourlyLogEvidenceUploadUrl(GetHourlyLogEvidenceUploadUrlRequest) returns (GetHourlyLogEvidenceUploadUrlResponse);
  rpc ListHourlyLogs(ListHourlyLogsRequest) returns (ListHourlyLogsResponse);
  rpc GetHourlyWorkSummary(GetHourlyWorkSummaryRequest) returns (GetHourlyWorkSummaryResponse);
  rpc UpdateHourlyLog(UpdateHourlyLogRequest) returns (UpdateHourlyLogResponse);
  rpc DeleteHourlyLog(DeleteHourlyLogRequest) returns (DeleteHourlyLogResponse);
  rpc ReviewHourlyLog(ReviewHourlyLogRequest) returns (ReviewHourlyLogResponse);
  rpc GetHourlyInvoice(GetHourlyInvoiceRequest) returns (GetHourlyInvoiceResponse);
  rpc ListHourlyInvoices(ListHourlyInvoicesRequest) returns (ListHourlyInvoicesResponse);
  rpc InternalCloseHourlyWeek(InternalCloseHourlyWeekRequest) returns (InternalCloseHourlyWeekResponse);
  rpc InternalSettleHourlyInvoice(InternalSettleHourlyInvoiceRequest) returns (InternalSettleHourlyInvoiceResponse);
  rpc CreateContractBonus(CreateContractBonusRequest) returns (CreateContractBonusResponse);
  rpc ListContractBonuses(ListContractBonusesRequest) returns (ListContractBonusesResponse);
  rpc InternalMarkContractBonusPaid(InternalMarkContractBonusPaidRequest) returns (InternalMarkContractBonusPaidResponse);

  // Propose an amendment to the contract. Only allowed when contract is ACTIVE or PAUSED. Either party may propose.
  rpc ProposeAmendment(ProposeAmendmentRequest) returns (ProposeAmendmentResponse);
  // Respond to an amendment. Only the counterparty (not proposer) may respond, only when amendment is PENDING, only ACCEPT/REJECT allowed, and only when contract is ACTIVE or PAUSED.
  rpc RespondAmendment(RespondAmendmentRequest) returns (RespondAmendmentResponse);
  // List all amendments for a contract. Both parties may read.
  rpc ListAmendments(ListAmendmentsRequest) returns (ListAmendmentsResponse);

  // Pause the contract. Client or freelancer may pause. Only allowed from ACTIVE state.
  rpc PauseContract(PauseContractRequest) returns (PauseContractResponse);
  // Resume the contract. Client or freelancer may resume. Only allowed from PAUSED state.
  rpc ResumeContract(ResumeContractRequest) returns (ResumeContractResponse);
  // End the contract. Client-only. Only allowed from ACTIVE or PAUSED state. Once ended, terminal.
  rpc EndContract(EndContractRequest) returns (EndContractResponse);

  rpc GetStatusHistory(GetStatusHistoryRequest) returns (GetStatusHistoryResponse);
}

enum ContractType {
  CONTRACT_TYPE_UNSPECIFIED = 0;
  CONTRACT_TYPE_FIXED = 1;
  CONTRACT_TYPE_HOURLY = 2;
}

enum ContractStatus {
  CONTRACT_STATUS_UNSPECIFIED = 0;
  CONTRACT_STATUS_PENDING_ACCEPTANCE = 1;
  CONTRACT_STATUS_ACTIVE = 2;
  CONTRACT_STATUS_DECLINED = 3;
  CONTRACT_STATUS_REVOKED = 4;
  CONTRACT_STATUS_PAUSED = 5;
  CONTRACT_STATUS_ENDED = 6;
}

enum MilestoneStatus {
  MILESTONE_STATUS_UNSPECIFIED = 0;
  MILESTONE_STATUS_PENDING = 1;
  MILESTONE_STATUS_SUBMITTED = 2;
  MILESTONE_STATUS_CHANGES_REQUESTED = 3;
  MILESTONE_STATUS_APPROVED = 4;
  MILESTONE_STATUS_FUNDED = 5;
  MILESTONE_STATUS_APPROVED_PENDING_SETTLEMENT = 6;
  MILESTONE_STATUS_RELEASED = 7;
}

enum HourlyLogStatus {
  HOURLY_LOG_STATUS_UNSPECIFIED = 0;
  HOURLY_LOG_STATUS_PENDING = 1;
  HOURLY_LOG_STATUS_APPROVED = 2;
  HOURLY_LOG_STATUS_REJECTED = 3;
}

enum AmendmentStatus {
  AMENDMENT_STATUS_UNSPECIFIED = 0;
  AMENDMENT_STATUS_PENDING = 1;
  AMENDMENT_STATUS_ACCEPTED = 2;
  AMENDMENT_STATUS_REJECTED = 3;
  AMENDMENT_STATUS_EXPIRED = 4;
}

enum HourlyInvoiceStatus {
  HOURLY_INVOICE_STATUS_UNSPECIFIED = 0;
  HOURLY_INVOICE_STATUS_DRAFT = 1;
  HOURLY_INVOICE_STATUS_SUBMITTED = 2;
  HOURLY_INVOICE_STATUS_IN_REVIEW = 3;
  HOURLY_INVOICE_STATUS_APPROVED = 4;
  HOURLY_INVOICE_STATUS_DISPUTED = 5;
  HOURLY_INVOICE_STATUS_CHARGED = 6;
  HOURLY_INVOICE_STATUS_PAID = 7;
  HOURLY_INVOICE_STATUS_FAILED = 8;
}

enum ContractBonusStatus {
  CONTRACT_BONUS_STATUS_UNSPECIFIED = 0;
  CONTRACT_BONUS_STATUS_PENDING = 1;
  CONTRACT_BONUS_STATUS_PAID = 2;
  CONTRACT_BONUS_STATUS_FAILED = 3;
}

message Milestone {
  int64 id = 1;
  string title = 2;
  string description = 3;
  int64 amount_minor = 4;
  int64 due_at_unix_seconds = 6;
  MilestoneStatus status = 7;
  string submission_note = 8;
  repeated string submission_urls = 9;
  int64 submitted_at_unix_seconds = 10;
  string review_note = 11;
  int64 reviewed_at_unix_seconds = 12;
  int32 revision_count = 13;
}

message HourlyLog {
  int64 id = 1;
  int64 contract_id = 2;
  string freelancer_id = 3;
  int64 work_date_unix_seconds = 4;
  int64 start_at_unix_seconds = 5;
  int64 end_at_unix_seconds = 6;
  int32 duration_minutes = 7;
  string note = 8;
  HourlyLogStatus status = 9;
  string review_note = 10;
  int64 created_at_unix_seconds = 11;
  int64 reviewed_at_unix_seconds = 12;
  int64 invoice_id = 13;
  repeated string evidence_urls = 14;
}

message HourlyInvoice {
  int64 id = 1;
  int64 contract_id = 2;
  string client_id = 3;
  string freelancer_id = 4;
  int64 week_start_unix_seconds = 5;
  int64 week_end_unix_seconds = 6;
  HourlyInvoiceStatus status = 7;
  int32 billable_minutes = 8;
  int64 hourly_rate_minor = 9;
  int64 amount_minor = 10;
  string dispute_id = 11;
  int64 created_at_unix_seconds = 12;
  int64 submitted_at_unix_seconds = 13;
  int64 approved_at_unix_seconds = 14;
  int64 paid_at_unix_seconds = 15;
  int64 failed_at_unix_seconds = 16;
}

message ContractBonus {
  int64 id = 1;
  int64 contract_id = 2;
  string client_id = 3;
  string freelancer_id = 4;
  int64 amount_minor = 5;
  string note = 6;
  ContractBonusStatus status = 7;
  int64 created_at_unix_seconds = 8;
  int64 paid_at_unix_seconds = 9;
  int64 failed_at_unix_seconds = 10;
}

message Amendment {
  int64 id = 1;
  int64 contract_id = 2;
  string proposed_by = 3;
  string summary = 4;
  AmendmentPayload payload = 5;
  AmendmentStatus status = 6;
  int64 expires_at_unix_seconds = 7;
  int64 responded_at_unix_seconds = 8;
  int64 created_at_unix_seconds = 9;
  string responded_by = 10;
  string response_note = 11;
}

enum StatusHistoryEventType {
  STATUS_HISTORY_EVENT_TYPE_UNSPECIFIED = 0;
  STATUS_HISTORY_EVENT_TYPE_CONTRACT_STATUS_CHANGED = 1;
  STATUS_HISTORY_EVENT_TYPE_MILESTONE_SUBMITTED = 2;
  STATUS_HISTORY_EVENT_TYPE_MILESTONE_CHANGES_REQUESTED = 3;
  STATUS_HISTORY_EVENT_TYPE_MILESTONE_APPROVED_PENDING_SETTLEMENT = 4;
  STATUS_HISTORY_EVENT_TYPE_MILESTONE_FUNDED = 5;
  STATUS_HISTORY_EVENT_TYPE_MILESTONE_RELEASED = 6;
  STATUS_HISTORY_EVENT_TYPE_HOURLY_INVOICE_CREATED = 7;
  STATUS_HISTORY_EVENT_TYPE_HOURLY_INVOICE_DISPUTED = 8;
  STATUS_HISTORY_EVENT_TYPE_HOURLY_INVOICE_PAID = 9;
  STATUS_HISTORY_EVENT_TYPE_CONTRACT_END_BLOCKED = 10;
}

message CompensationChange {
  int64 new_hourly_rate_minor = 1;
  int64 new_fixed_total_minor = 2;
}

message MilestonesChange {
  repeated Milestone milestones = 1;
}

message WeeklyLimitChange {
  int32 new_weekly_hour_limit = 1;
}

message ScopeChange {
  string new_title = 1;
  string new_description = 2;
}

message AmendmentPayload {
  CompensationChange compensation_change = 1;
  MilestonesChange milestones_change = 2;
  WeeklyLimitChange weekly_limit_change = 3;
  ScopeChange scope_change = 4;
}

message StatusHistoryEntry {
  int64 id = 1;
  int64 contract_id = 2;
  ContractStatus status = 3;
  string reason = 4;
  string actor_id = 5;
  int64 created_at_unix_seconds = 6;
  StatusHistoryEventType event_type = 7;
  int64 milestone_id = 8;
}

message Contract {
  int64 id = 1;
  string client_id = 2;
  string freelancer_id = 3;
  int64 job_id = 4;
  int64 proposal_id = 5;
  ContractType contract_type = 6;
  ContractStatus status = 7;

  string title = 8;
  string description = 9;
  int64 hourly_rate_minor = 11;
  int64 fixed_total_minor = 12;
  int32 weekly_hour_limit = 13;

  repeated Milestone milestones = 14;

  int64 created_at_unix_seconds = 15;
  int64 updated_at_unix_seconds = 16;
  int64 activated_at_unix_seconds = 17;
  int64 declined_at_unix_seconds = 18;
  int64 revoked_at_unix_seconds = 19;
  int64 paused_at_unix_seconds = 20;
  int64 ended_at_unix_seconds = 21;
}

message CreateContractRequest {
  string freelancer_id = 1;
  int64 job_id = 2;
  int64 proposal_id = 3;
  ContractType contract_type = 4;
  string title = 5;
  string description = 6;
  int64 hourly_rate_minor = 8;
  int64 fixed_total_minor = 9;
  int32 weekly_hour_limit = 10;
  repeated Milestone milestones = 11;
}

message CreateContractResponse {
  Contract contract = 1;
}

message GetContractRequest {
  int64 contract_id = 1;
}

message GetContractResponse {
  Contract contract = 1;
}

message ListMyContractsRequest {
  ContractStatus status = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListMyContractsResponse {
  repeated Contract contracts = 1;
  string next_page_token = 2;
}

message GetJobOfferStateRequest {
  int64 job_id = 1;
}

message GetJobOfferStateResponse {
  int64 job_id = 1;
  bool has_pending_offer = 2;
  int64 pending_contract_id = 3;
  bool has_active_contract = 4;
  int64 active_contract_id = 5;
}

message AcceptContractRequest {
  int64 contract_id = 1;
}

message AcceptContractResponse {
  Contract contract = 1;
}

message DeclineContractRequest {
  int64 contract_id = 1;
  string reason = 2;
}

message DeclineContractResponse {
  Contract contract = 1;
}

message RevokeContractOfferRequest {
  int64 contract_id = 1;
  string reason = 2;
}

message RevokeContractOfferResponse {
  Contract contract = 1;
}

message SubmitMilestoneWorkRequest {
  int64 contract_id = 1;
  int64 milestone_id = 2;
  string note = 3;
  repeated string attachments = 4;
}

message SubmitMilestoneWorkResponse {
  Contract contract = 1;
}

message RequestMilestoneChangesRequest {
  int64 contract_id = 1;
  int64 milestone_id = 2;
  string note = 3;
}

message RequestMilestoneChangesResponse {
  Contract contract = 1;
}

message ApproveMilestoneSubmissionRequest {
  int64 contract_id = 1;
  int64 milestone_id = 2;
}

message ApproveMilestoneSubmissionResponse {
  Contract contract = 1;
}

message InternalMarkMilestoneFundedRequest {
  int64 contract_id = 1;
  int64 milestone_id = 2;
}

message InternalMarkMilestoneFundedResponse {
  Contract contract = 1;
}

message LogHourlyWorkRequest {
  int64 contract_id = 1;
  int64 start_at_unix_seconds = 2;
  int64 end_at_unix_seconds = 3;
  string note = 4;
  repeated string evidence_urls = 5;
}

message LogHourlyWorkResponse {
  HourlyLog hourly_log = 1;
}

message GetHourlyLogEvidenceUploadUrlRequest {
  int64 contract_id = 1;
  string file_name = 2;
  string content_type = 3;
}

message GetHourlyLogEvidenceUploadUrlResponse {
  string storage_key = 1;
  string upload_url = 2;
}

message ListHourlyLogsRequest {
  int64 contract_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListHourlyLogsResponse {
  repeated HourlyLog hourly_logs = 1;
  string next_page_token = 2;
}

message GetHourlyWorkSummaryRequest {
  int64 contract_id = 1;
  int64 week_start_unix_seconds = 2;
}

message GetHourlyWorkSummaryResponse {
  int64 contract_id = 1;
  int64 week_start_unix_seconds = 2;
  int64 week_end_unix_seconds = 3;
  int32 weekly_hour_limit = 4;
  int32 billable_minutes = 5;
  int32 pending_minutes = 6;
  int32 approved_minutes = 7;
  int32 rejected_minutes = 8;
  int32 remaining_minutes = 9;
  int64 hourly_rate_minor = 10;
  int64 estimated_billable_amount_minor = 11;
}

message ReviewHourlyLogRequest {
  int64 hourly_log_id = 1;
  HourlyLogStatus status = 2;
  string review_note = 3;
}

message ReviewHourlyLogResponse {
  HourlyLog hourly_log = 1;
}

message UpdateHourlyLogRequest {
  int64 hourly_log_id = 1;
  int64 start_at_unix_seconds = 2;
  int64 end_at_unix_seconds = 3;
  string note = 4;
  repeated string evidence_urls = 5;
}

message UpdateHourlyLogResponse {
  HourlyLog hourly_log = 1;
}

message DeleteHourlyLogRequest {
  int64 hourly_log_id = 1;
}

message DeleteHourlyLogResponse {}

message GetHourlyInvoiceRequest {
  int64 invoice_id = 1;
}

message GetHourlyInvoiceResponse {
  HourlyInvoice invoice = 1;
}

message ListHourlyInvoicesRequest {
  int64 contract_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListHourlyInvoicesResponse {
  repeated HourlyInvoice invoices = 1;
  string next_page_token = 2;
}

message InternalCloseHourlyWeekRequest {
  int64 contract_id = 1;
  int64 week_start_unix_seconds = 2;
}

message InternalCloseHourlyWeekResponse {
  HourlyInvoice invoice = 1;
}

message InternalSettleHourlyInvoiceRequest {
  int64 invoice_id = 1;
}

message InternalSettleHourlyInvoiceResponse {
  HourlyInvoice invoice = 1;
}

message CreateContractBonusRequest {
  int64 contract_id = 1;
  int64 amount_minor = 2;
  string note = 3;
}

message CreateContractBonusResponse {
  ContractBonus bonus = 1;
}

message ListContractBonusesRequest {
  int64 contract_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListContractBonusesResponse {
  repeated ContractBonus bonuses = 1;
  string next_page_token = 2;
}

message InternalMarkContractBonusPaidRequest {
  int64 bonus_id = 1;
}

message InternalMarkContractBonusPaidResponse {
  ContractBonus bonus = 1;
}

message ProposeAmendmentRequest {
  int64 contract_id = 1;
  string summary = 2;
  AmendmentPayload payload = 3;
  int64 expires_at_unix_seconds = 4;
}

message ProposeAmendmentResponse {
  Amendment amendment = 1;
}

message RespondAmendmentRequest {
  int64 amendment_id = 1;
  AmendmentStatus status = 2;
  string response_note = 3;
}

message RespondAmendmentResponse {
  Amendment amendment = 1;
}

message ListAmendmentsRequest {
  int64 contract_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListAmendmentsResponse {
  repeated Amendment amendments = 1;
  string next_page_token = 2;
}

message PauseContractRequest {
  int64 contract_id = 1;
  string reason = 2;
}

message PauseContractResponse {
  Contract contract = 1;
}

message ResumeContractRequest {
  int64 contract_id = 1;
  string reason = 2;
}

message ResumeContractResponse {
  Contract contract = 1;
}

message EndContractRequest {
  int64 contract_id = 1;
  string reason = 2;
}

message EndContractResponse {
  Contract contract = 1;
}

message GetStatusHistoryRequest {
  int64 contract_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message GetStatusHistoryResponse {
  repeated StatusHistoryEntry entries = 1;
  string next_page_token = 2;
}
