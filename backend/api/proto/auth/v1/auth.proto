syntax = "proto3";

package auth.v1;

option go_package = "jobconnect/auth/gen/auth/v1;authv1";

// AuthService is the internal authentication API (gRPC).
service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc VerifyEmailOTP(VerifyEmailOTPRequest) returns (VerifyEmailOTPResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  // Log out current session (by refresh token).
  rpc LogoutEverywhere(LogoutEverywhereRequest) returns (LogoutEverywhereResponse);
  rpc ForgotPassword(ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
  rpc RequestEmailChange(RequestEmailChangeRequest) returns (RequestEmailChangeResponse);
  rpc ConfirmEmailChange(ConfirmEmailChangeRequest) returns (ConfirmEmailChangeResponse);
  rpc OAuthLogin(OAuthLoginRequest) returns (OAuthLoginResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc RevokeSession(RevokeSessionRequest) returns (RevokeSessionResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 6;
  // e.g. "client", "freelancer", "admin"
  string role = 4;
  bool accept_terms = 5;
}

message RegisterResponse {
  string user_id = 1;
  // For UX: indicates OTP was sent.
  bool otp_sent = 2;
}

message VerifyEmailOTPRequest {
  string email = 1;
  string otp = 2;
}

message VerifyEmailOTPResponse {
  bool verified = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 access_token_expires_in_seconds = 3;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 access_token_expires_in_seconds = 3;
}

message LogoutEverywhereRequest {
  string refresh_token = 1;
}

message LogoutEverywhereResponse {
  bool ok = 1;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ForgotPasswordResponse {
  // Always true for anti-enumeration behavior.
  bool accepted = 1;
}

message ResetPasswordRequest {
  string email = 1;
  string otp = 2;
  string new_password = 3;
}

message ResetPasswordResponse {
  bool ok = 1;
}

message RequestEmailChangeRequest {
  string user_id = 1;
  string new_email = 2;
}

message RequestEmailChangeResponse {
  bool otp_sent = 1;
}

message ConfirmEmailChangeRequest {
  string user_id = 1;
  string otp = 2;
}

message ConfirmEmailChangeResponse {
  bool ok = 1;
}

message OAuthLoginRequest {
  string provider = 1;
  string provider_user_id = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
  string display_name = 6;
  // Optional for first time signup. Defaults to client when omitted.
  string role = 7;
}

message OAuthLoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 access_token_expires_in_seconds = 3;
  bool is_new_user = 4;
}

message ListSessionsRequest {
  string user_id = 1;
}

message Session {
  string session_id = 1;
  string created_at = 2;
  string expires_at = 3;
  string last_used_at = 4;
}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message RevokeSessionRequest {
  string user_id = 1;
  string session_id = 2;
}

message RevokeSessionResponse {
  bool ok = 1;
}

