    string user_id = 2;
    string role = 3;
    string first_name = 4;
    string last_name = 5;
    string display_name = 6;
    string avatar_url = 7;
    string language = 8;
    string contact_email = 9;
    string contact_phone = 10;
    string bio = 11;
    bool deleted = 12;
    ClientProfileInput client = 13;
    FreelancerProfileInput freelancer = 14;
    AccountStatus status = 15;
    string suspension_reason = 16;
    ProfileVisibility visibility = 17;
    CapabilityFlags capabilities = 18;
}

message User {
    string user_id = 1;
    string role = 2;
    AccountStatus status = 3;
    ProfileVisibility visibility = 4;
    string first_name = 5;
    string last_name = 6;
    string display_name = 7;
    string avatar_url = 8;
    int64 created_at_unix = 9;
    int64 updated_at_unix = 10;
}

message PublicProfile {
    string user_id = 1;
    string display_name = 2;
    string avatar_url = 3;
    string headline = 4;
    string bio = 5;
    repeated string skills = 6;
    string experience_level = 7;
    Reputation reputation = 8;
    double hourly_rate = 9;
    Availability availability = 10;
    string location = 11;
    int64 last_active_at_unix = 12;
    VerificationStatus verification_status = 13;
}

message CapabilityFlags {
    bool can_apply_jobs = 1;
    bool can_post_jobs = 2;
    bool can_withdraw_funds = 3;
    bool can_message = 4;
    bool can_be_discovered = 5;
}

message ProfileCompleteness {
    uint32 percent = 1;
    repeated string missing_required_fields = 2;
}

message OnboardingStep {
    string key = 1;
    OnboardingStepStatus status = 2;
}

message Reputation {
    double job_success_score = 1;
    double avg_rating = 2;
    uint32 total_reviews = 3;
    uint32 total_jobs = 4;
    double total_earnings_usd = 5;
}

message ClientProfileInput {
    string company_name = 1;
    string billing_address = 2;
    string tax_id = 3;
    VerificationStatus verification_status = 4;
}

message FreelancerProfileInput {
    string headline = 1;
    string bio = 2;
    repeated string skills = 3;
    string experience_level = 4;
    double rating = 5;
    VerificationStatus verification_status = 6;
    Reputation reputation = 7;
    double hourly_rate = 8;
    Availability availability = 9;
    string location = 10;
    int64 last_active_at_unix = 11;
}

