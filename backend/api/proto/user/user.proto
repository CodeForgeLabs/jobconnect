syntax = "proto3";

package user.v1;
option go_package = "jobconnect/user/gen/user;userv1";

service UserService {
    rpc CreateProfile(CreateProfileRequest) returns (CreateProfileResponse);
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
    rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
    rpc GetPublicProfile(GetPublicProfileRequest) returns (GetPublicProfileResponse);
    rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
    rpc DeleteProfile(DeleteProfileRequest) returns (DeleteProfileResponse);
    rpc GetOnboardingStatus(GetOnboardingStatusRequest) returns (GetOnboardingStatusResponse);
    rpc UpdateAccountStatus(UpdateAccountStatusRequest) returns (UpdateAccountStatusResponse);
    rpc UploadAvatar(UploadAvatarRequest) returns (UploadAvatarResponse);
    rpc GetAvatar(GetAvatarRequest) returns (GetAvatarResponse);
    rpc RemoveAvatar(RemoveAvatarRequest) returns (RemoveAvatarResponse);

    // Portfolio endpoints.
    rpc CreatePortfolioItem(CreatePortfolioItemRequest) returns (CreatePortfolioItemResponse);
    rpc UpdatePortfolioItem(UpdatePortfolioItemRequest) returns (UpdatePortfolioItemResponse);
    rpc DeletePortfolioItem(DeletePortfolioItemRequest) returns (DeletePortfolioItemResponse);
    rpc ListMyPortfolioItems(ListMyPortfolioItemsRequest) returns (ListMyPortfolioItemsResponse);
    rpc ListPublicPortfolioItems(ListPublicPortfolioItemsRequest) returns (ListPublicPortfolioItemsResponse);
    rpc ReorderPortfolioItems(ReorderPortfolioItemsRequest) returns (ReorderPortfolioItemsResponse);

    // Employment and education endpoints.
    rpc CreateEmployment(CreateEmploymentRequest) returns (CreateEmploymentResponse);
    rpc UpdateEmployment(UpdateEmploymentRequest) returns (UpdateEmploymentResponse);
    rpc DeleteEmployment(DeleteEmploymentRequest) returns (DeleteEmploymentResponse);
    rpc ListMyEmployment(ListMyEmploymentRequest) returns (ListMyEmploymentResponse);
    rpc ListPublicEmployment(ListPublicEmploymentRequest) returns (ListPublicEmploymentResponse);
    rpc CreateEducation(CreateEducationRequest) returns (CreateEducationResponse);
    rpc UpdateEducation(UpdateEducationRequest) returns (UpdateEducationResponse);
    rpc DeleteEducation(DeleteEducationRequest) returns (DeleteEducationResponse);
    rpc ListMyEducation(ListMyEducationRequest) returns (ListMyEducationResponse);
    rpc ListPublicEducation(ListPublicEducationRequest) returns (ListPublicEducationResponse);

    // Certifications and languages endpoints.
    rpc CreateCertification(CreateCertificationRequest) returns (CreateCertificationResponse);
    rpc UpdateCertification(UpdateCertificationRequest) returns (UpdateCertificationResponse);
    rpc DeleteCertification(DeleteCertificationRequest) returns (DeleteCertificationResponse);
    rpc ListMyCertifications(ListMyCertificationsRequest) returns (ListMyCertificationsResponse);
    rpc ListPublicCertifications(ListPublicCertificationsRequest) returns (ListPublicCertificationsResponse);
    rpc UpsertLanguages(UpsertLanguagesRequest) returns (UpsertLanguagesResponse);
    rpc GetMyLanguages(GetMyLanguagesRequest) returns (GetMyLanguagesResponse);
    rpc GetPublicLanguages(GetPublicLanguagesRequest) returns (GetPublicLanguagesResponse);

    // Shared account settings endpoints.
    rpc GetAccountSettings(GetAccountSettingsRequest) returns (GetAccountSettingsResponse);
    rpc UpdateAccountSettings(UpdateAccountSettingsRequest) returns (UpdateAccountSettingsResponse);
    rpc GetPrivacySettings(GetPrivacySettingsRequest) returns (GetPrivacySettingsResponse);
    rpc UpdatePrivacySettings(UpdatePrivacySettingsRequest) returns (UpdatePrivacySettingsResponse);
    rpc GetNotificationSettings(GetNotificationSettingsRequest) returns (GetNotificationSettingsResponse);
    rpc UpdateNotificationSettings(UpdateNotificationSettingsRequest) returns (UpdateNotificationSettingsResponse);

    // Optional internal lightweight read-model endpoints.
    rpc GetInternalUserBasic(GetInternalUserBasicRequest) returns (GetInternalUserBasicResponse);
    rpc GetInternalUserProfile(GetInternalUserProfileRequest) returns (GetInternalUserProfileResponse);

    // Freelancer preference endpoints.
    rpc SetAvailability(SetAvailabilityRequest) returns (SetAvailabilityResponse);
    rpc GetAvailability(GetAvailabilityRequest) returns (GetAvailabilityResponse);
    rpc SetRates(SetRatesRequest) returns (SetRatesResponse);
    rpc GetRates(GetRatesRequest) returns (GetRatesResponse);
    rpc SetWorkPreferences(SetWorkPreferencesRequest) returns (SetWorkPreferencesResponse);
    rpc GetWorkPreferences(GetWorkPreferencesRequest) returns (GetWorkPreferencesResponse);
}

enum AccountStatus {
    ACCOUNT_STATUS_UNSPECIFIED = 0;
    ACCOUNT_STATUS_ACTIVE = 1;
    ACCOUNT_STATUS_SUSPENDED = 2;
    ACCOUNT_STATUS_DELETED = 3;
}

enum ProfileVisibility {
    PROFILE_VISIBILITY_UNSPECIFIED = 0;
    PROFILE_VISIBILITY_PUBLIC = 1;
    PROFILE_VISIBILITY_PRIVATE = 2;
}

enum OnboardingStepStatus {
    ONBOARDING_STEP_STATUS_UNSPECIFIED = 0;
    ONBOARDING_STEP_STATUS_NOT_STARTED = 1;
    ONBOARDING_STEP_STATUS_COMPLETED = 2;
}

enum VerificationStatus {
    VERIFICATION_STATUS_UNSPECIFIED = 0;
    VERIFICATION_STATUS_PENDING = 1;
    VERIFICATION_STATUS_VERIFIED = 2;
    VERIFICATION_STATUS_REJECTED = 3;
    VERIFICATION_STATUS_EXPIRED = 4;
}

enum Availability {
    AVAILABILITY_UNSPECIFIED = 0;
    AVAILABILITY_FULL_TIME = 1;
    AVAILABILITY_PART_TIME = 2;
    AVAILABILITY_AS_NEEDED = 3;
    AVAILABILITY_UNAVAILABLE = 4;
}

enum PortfolioMediaType {
    PORTFOLIO_MEDIA_TYPE_UNSPECIFIED = 0;
    PORTFOLIO_MEDIA_TYPE_IMAGE = 1;
    PORTFOLIO_MEDIA_TYPE_VIDEO = 2;
    PORTFOLIO_MEDIA_TYPE_FILE = 3;
    PORTFOLIO_MEDIA_TYPE_LINK = 4;
}

message CreateProfileRequest {
    string user_id = 1;
    // Matches AuthService role values: "client", "freelancer", "admin".
    string role = 2;
    string first_name = 3;
    string last_name = 4;
    string display_name = 5;
    string avatar_url = 6;

    oneof role_details {
        ClientProfileInput client = 7;
        FreelancerProfileInput freelancer = 8;
    }
}

message CreateProfileResponse {
    bool success = 1;
    int64 profile_id = 2;
}

message GetUserRequest {
    string user_id = 1;
}

message GetUserResponse {
    User user = 1;
}

message GetProfileRequest {
    string user_id = 1;
}

message GetProfileResponse {
    Profile profile = 1;
}

message GetPublicProfileRequest {
    string user_id = 1;
}

message GetPublicProfileResponse {
    PublicProfile profile = 1;
}

message UpdateProfileRequest {
    string user_id = 1;
    optional string display_name = 2;
    optional string avatar_url = 3;
    optional string language = 4;
    optional string contact_email = 5;
    optional string contact_phone = 6;
    optional string bio = 7;
    optional string first_name = 8;
    optional string last_name = 9;
    optional string company_name = 10;
    optional string billing_address = 11;
    optional string tax_id = 12;
    optional string headline = 13;
    repeated string skills = 14;
    optional string experience_level = 15;
    optional double hourly_rate = 16;
    optional Availability availability = 17;
    optional string location = 18;
    optional int64 last_active_at_unix = 19;
}

message UpdateProfileResponse {
    Profile profile = 1;
    ProfileCompleteness completeness = 2;
}

message DeleteProfileRequest {
    string user_id = 1;
    bool hard_delete = 2;
}

message DeleteProfileResponse {
    bool deleted = 1;
}

message GetOnboardingStatusRequest {
    string user_id = 1;
}

message GetOnboardingStatusResponse {
    ProfileCompleteness completeness = 1;
    repeated OnboardingStep steps = 2;
}

message UpdateAccountStatusRequest {
    string user_id = 1;
    AccountStatus status = 2;
    optional string suspension_reason = 3;
    ProfileVisibility visibility = 4;
}

message UpdateAccountStatusResponse {
    Profile profile = 1;
}

message UploadAvatarRequest {
    string user_id = 1;
    string file_name = 2;
    string content_type = 3;
    bytes content = 4;
}

message UploadAvatarResponse {
    string avatar_url = 1;
    string preview_url = 2;
    string content_type = 3;
    int64 size_bytes = 4;
    int32 width = 5;
    int32 height = 6;
}

message GetAvatarRequest {
    string user_id = 1;
}

message GetAvatarResponse {
    string file_name = 1;
    string content_type = 2;
    bytes content = 3;
}

message RemoveAvatarRequest {
    string user_id = 1;
}

message RemoveAvatarResponse {
    bool removed = 1;
}

message PortfolioMedia {
    int64 id = 1;
    PortfolioMediaType media_type = 2;
    string storage_key = 3;
    string external_url = 4;
    string file_name = 5;
    string content_type = 6;
    int64 size_bytes = 7;
    int32 width = 8;
    int32 height = 9;
    int32 sort_order = 10;
}

message PortfolioItem {
    int64 id = 1;
    string user_id = 2;
    string title = 3;
    string description = 4;
    string project_url = 5;
    string role_in_project = 6;
    int64 completed_at_unix = 7;
    int32 sort_order = 8;
    ProfileVisibility visibility = 9;
    repeated string tags = 10;
    repeated PortfolioMedia media = 11;
    int64 created_at_unix = 12;
    int64 updated_at_unix = 13;
}

message CreatePortfolioItemRequest {
    string user_id = 1;
    string title = 2;
    string description = 3;
    string project_url = 4;
    string role_in_project = 5;
    int64 completed_at_unix = 6;
    ProfileVisibility visibility = 7;
    repeated string tags = 8;
    repeated PortfolioMedia media = 9;
}

message CreatePortfolioItemResponse {
    PortfolioItem item = 1;
}

message UpdatePortfolioItemRequest {
    string user_id = 1;
    int64 item_id = 2;
    optional string title = 3;
    optional string description = 4;
    optional string project_url = 5;
    optional string role_in_project = 6;
    optional int64 completed_at_unix = 7;
    optional ProfileVisibility visibility = 8;
    repeated string tags = 9;
    repeated PortfolioMedia media = 10;
}

message UpdatePortfolioItemResponse {
    PortfolioItem item = 1;
}

message DeletePortfolioItemRequest {
    string user_id = 1;
    int64 item_id = 2;
}

message DeletePortfolioItemResponse {
    bool deleted = 1;
}

message ListMyPortfolioItemsRequest {
    string user_id = 1;
    uint32 page_size = 2;
    string page_token = 3;
}

message ListMyPortfolioItemsResponse {
    repeated PortfolioItem items = 1;
    string next_page_token = 2;
}

message ListPublicPortfolioItemsRequest {
    string user_id = 1;
    uint32 page_size = 2;
    string page_token = 3;
}

message ListPublicPortfolioItemsResponse {
