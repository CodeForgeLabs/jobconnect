syntax = "proto3";

package user.v1;
option go_package = "jobconnect/user/gen/user;userv1";

service UserService {
  // Self endpoints.
  rpc CreateMyProfile(CreateMyProfileRequest) returns (CreateMyProfileResponse);
  rpc GetMyProfile(GetMyProfileRequest) returns (GetMyProfileResponse);
  rpc PatchMyProfile(PatchMyProfileRequest) returns (PatchMyProfileResponse);
  rpc DeleteMyProfile(DeleteMyProfileRequest) returns (DeleteMyProfileResponse);
  rpc GetMyOnboardingStatus(GetMyOnboardingStatusRequest)
      returns (GetMyOnboardingStatusResponse);
  rpc GetMySettings(GetMySettingsRequest) returns (GetMySettingsResponse);
  rpc PatchMySettings(PatchMySettingsRequest)
    returns (PatchMySettingsResponse);

  rpc UpsertMyAvatar(UploadMyAvatarRequest) returns (UploadMyAvatarResponse);
  rpc GetMyAvatar(GetMyAvatarRequest) returns (GetMyAvatarResponse);
  rpc RemoveMyAvatar(RemoveMyAvatarRequest) returns (RemoveMyAvatarResponse);

  rpc CreateMyPortfolioItem(CreateMyPortfolioItemRequest)
      returns (CreateMyPortfolioItemResponse);
  rpc GetMyPortfolioItem(GetMyPortfolioItemRequest)
      returns (GetMyPortfolioItemResponse);
  rpc UpdateMyPortfolioItem(UpdateMyPortfolioItemRequest)
      returns (UpdateMyPortfolioItemResponse);
  rpc DeleteMyPortfolioItem(DeleteMyPortfolioItemRequest)
      returns (DeleteMyPortfolioItemResponse);
  rpc ListMyPortfolioItems(ListMyPortfolioItemsRequest)
      returns (ListMyPortfolioItemsResponse);

  rpc CreateMyEmployment(CreateMyEmploymentRequest)
      returns (CreateMyEmploymentResponse);
  rpc GetMyEmployment(GetMyEmploymentRequest) returns (GetMyEmploymentResponse);
  rpc UpdateMyEmployment(UpdateMyEmploymentRequest)
      returns (UpdateMyEmploymentResponse);
  rpc DeleteMyEmployment(DeleteMyEmploymentRequest)
      returns (DeleteMyEmploymentResponse);
  rpc ListMyEmployment(ListMyEmploymentRequest)
      returns (ListMyEmploymentResponse);

  rpc CreateMyEducation(CreateMyEducationRequest)
      returns (CreateMyEducationResponse);
  rpc GetMyEducation(GetMyEducationRequest) returns (GetMyEducationResponse);
  rpc UpdateMyEducation(UpdateMyEducationRequest)
      returns (UpdateMyEducationResponse);
  rpc DeleteMyEducation(DeleteMyEducationRequest)
      returns (DeleteMyEducationResponse);
  rpc ListMyEducation(ListMyEducationRequest)
      returns (ListMyEducationResponse);

  rpc CreateMyCertification(CreateMyCertificationRequest)
      returns (CreateMyCertificationResponse);
  rpc GetMyCertification(GetMyCertificationRequest)
      returns (GetMyCertificationResponse);
  rpc UpdateMyCertification(UpdateMyCertificationRequest)
      returns (UpdateMyCertificationResponse);
  rpc DeleteMyCertification(DeleteMyCertificationRequest)
      returns (DeleteMyCertificationResponse);
  rpc ListMyCertifications(ListMyCertificationsRequest)
      returns (ListMyCertificationsResponse);

  rpc UpsertMyLanguages(UpsertMyLanguagesRequest)
      returns (UpsertMyLanguagesResponse);
  rpc GetMyLanguages(GetMyLanguagesRequest) returns (GetMyLanguagesResponse);

  rpc PatchMyAvailability(PatchMyAvailabilityRequest)
      returns (PatchMyAvailabilityResponse);
  rpc GetMyAvailability(GetMyAvailabilityRequest)
      returns (GetMyAvailabilityResponse);
  rpc PatchMyRates(PatchMyRatesRequest) returns (PatchMyRatesResponse);
  rpc GetMyRates(GetMyRatesRequest) returns (GetMyRatesResponse);
  rpc PatchMyWorkPreferences(PatchMyWorkPreferencesRequest)
      returns (PatchMyWorkPreferencesResponse);
  rpc GetMyWorkPreferences(GetMyWorkPreferencesRequest)
      returns (GetMyWorkPreferencesResponse);

  rpc GetMyHiringPreferences(GetMyHiringPreferencesRequest)
      returns (GetMyHiringPreferencesResponse);
  rpc PatchMyHiringPreferences(PatchMyHiringPreferencesRequest)
      returns (PatchMyHiringPreferencesResponse);
  rpc SaveFreelancer(SaveFreelancerRequest) returns (SaveFreelancerResponse);
  rpc ListSavedFreelancers(ListSavedFreelancersRequest)
      returns (ListSavedFreelancersResponse);
  rpc RemoveSavedFreelancer(RemoveSavedFreelancerRequest)
      returns (RemoveSavedFreelancerResponse);
  rpc UpsertFreelancerNote(UpsertFreelancerNoteRequest)
      returns (UpsertFreelancerNoteResponse);
  rpc GetFreelancerNote(GetFreelancerNoteRequest)
      returns (GetFreelancerNoteResponse);

    // Public endpoints.
  rpc GetPublicProfile(GetPublicProfileRequest)
      returns (GetPublicProfileResponse);
  rpc ListPublicPortfolioItems(ListPublicPortfolioItemsRequest)
      returns (ListPublicPortfolioItemsResponse);
  rpc ListPublicEmployment(ListPublicEmploymentRequest)
      returns (ListPublicEmploymentResponse);
  rpc ListPublicEducation(ListPublicEducationRequest)
      returns (ListPublicEducationResponse);
  rpc ListPublicCertifications(ListPublicCertificationsRequest)
      returns (ListPublicCertificationsResponse);
  rpc GetPublicLanguages(GetPublicLanguagesRequest)
      returns (GetPublicLanguagesResponse);

  // Admin endpoints.
  rpc GetUserProfile(GetUserProfileRequest) returns (GetUserProfileResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc PatchUserGovernance(PatchUserGovernanceRequest)
      returns (PatchUserGovernanceResponse);
  rpc GetUserAuditSummary(GetUserAuditSummaryRequest)
      returns (GetUserAuditSummaryResponse);

    // Internal endpoints.
  rpc GetInternalUserBasic(GetInternalUserBasicRequest)
      returns (GetInternalUserBasicResponse);
  rpc GetInternalUserProfile(GetInternalUserProfileRequest)
      returns (GetInternalUserProfileResponse);
  rpc PatchFreelancerMetrics(PatchFreelancerMetricsRequest)
      returns (PatchFreelancerMetricsResponse);
  rpc TouchLastActive(TouchLastActiveRequest) returns (TouchLastActiveResponse);
}

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_CLIENT = 1;
  USER_ROLE_FREELANCER = 2;
  USER_ROLE_ADMIN = 3;
}

enum AccountStatus {
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  ACCOUNT_STATUS_ACTIVE = 1;
  ACCOUNT_STATUS_SUSPENDED = 2;
  ACCOUNT_STATUS_DELETED = 3;
}

enum VerificationStatus {
  VERIFICATION_STATUS_UNSPECIFIED = 0;
  VERIFICATION_STATUS_PENDING = 1;
  VERIFICATION_STATUS_VERIFIED = 2;
  VERIFICATION_STATUS_REJECTED = 3;
  VERIFICATION_STATUS_EXPIRED = 4;
}

enum Availability {
  AVAILABILITY_UNSPECIFIED = 0;
  AVAILABILITY_FULL_TIME = 1;
  AVAILABILITY_PART_TIME = 2;
  AVAILABILITY_AS_NEEDED = 3;
  AVAILABILITY_UNAVAILABLE = 4;
}

enum PortfolioMediaType {
  PORTFOLIO_MEDIA_TYPE_UNSPECIFIED = 0;
  PORTFOLIO_MEDIA_TYPE_IMAGE = 1;
  PORTFOLIO_MEDIA_TYPE_VIDEO = 2;
  PORTFOLIO_MEDIA_TYPE_FILE = 3;
  PORTFOLIO_MEDIA_TYPE_LINK = 4;
}

enum LanguageProficiencyLevel {
  LANGUAGE_PROFICIENCY_LEVEL_UNSPECIFIED = 0;
  LANGUAGE_PROFICIENCY_LEVEL_BASIC = 1;
  LANGUAGE_PROFICIENCY_LEVEL_CONVERSATIONAL = 2;
  LANGUAGE_PROFICIENCY_LEVEL_FLUENT = 3;
  LANGUAGE_PROFICIENCY_LEVEL_NATIVE = 4;
}

enum OnboardingStepStatus {
  ONBOARDING_STEP_STATUS_UNSPECIFIED = 0;
  ONBOARDING_STEP_STATUS_NOT_STARTED = 1;
  ONBOARDING_STEP_STATUS_COMPLETED = 2;
}

message StringList {
  repeated string values = 1;
}

message PagingRequest {
  uint32 page_size = 1;
  string page_token = 2;
}

message PagingResponse {
  string next_page_token = 1;
}

message UserCore {
  int64 profile_id = 1;
  string user_id = 2;
  UserRole role = 3;
  string first_name = 4;
  string last_name = 5;
  string display_name = 6;
  string avatar_url = 7;
  string language = 8;
  string contact_email = 9;
  string contact_phone = 10;
  string bio = 11;
  AccountStatus account_status = 12;
  string suspension_reason = 13;
  string tax_id = 15;
  VerificationStatus verification_status = 16;
  int64 created_at_unix = 17;
  int64 updated_at_unix = 18;
  optional int64 deleted_at_unix = 19;
}

message ClientProfile {
  string company_name = 1;
}

message FreelancerMetrics {
  double rating = 1;
  double job_success_score = 2;
  uint32 total_reviews = 3;
  uint32 total_jobs = 4;
  double total_earnings = 5;
  optional int64 last_active_at_unix = 6;
  VerificationStatus verification_status = 7;
}

message FreelancerProfile {
  string headline = 1;
  repeated string skills = 2;
  double hourly_rate = 3;
  Availability availability = 4;
  string location = 5;
  FreelancerMetrics metrics = 6;
}

message ProfileAvatar {
  string user_id = 1;
  string file_name = 2;
  string content_type = 3;
  string storage_key = 4;
  int64 size_bytes = 5;
  int32 width = 6;
  int32 height = 7;
  int64 updated_at_unix = 8;
}

message UserProfile {
  UserCore core = 1;
  ClientProfile client = 2;
  FreelancerProfile freelancer = 3;
  CapabilityFlags capabilities = 4;
}

message PublicProfile {
  string user_id = 1;
  string display_name = 2;
  string avatar_url = 3;
  string headline = 4;
  string bio = 5;
  repeated string skills = 6;
  double hourly_rate = 7;
  Availability availability = 8;
  string location = 9;
  optional int64 last_active_at_unix = 10;
  VerificationStatus verification_status = 11;
  FreelancerMetrics metrics = 12;
}

message CapabilityFlags {
  bool can_apply_jobs = 1;
  bool can_post_jobs = 2;
  bool can_withdraw_funds = 3;
  bool can_message = 4;
  bool can_be_discovered = 5;
}

message ProfileCompleteness {
  uint32 percent = 1;
  repeated string missing_required_fields = 2;
}

message OnboardingStep {
  string key = 1;
  OnboardingStepStatus status = 2;
}

message CreateMyProfileRequest {
  string user_id = 1;
  UserRole role = 2;
  string first_name = 3;
  string last_name = 4;
  string display_name = 5;
  string contact_email = 7;

  oneof role_profile {
    ClientProfileCreateInput client = 8;
    FreelancerProfileCreateInput freelancer = 9;
  }
}

message ClientProfileCreateInput {
  string company_name = 1;
}

message FreelancerProfileCreateInput {
  string headline = 1;
  repeated string skills = 2;
  double hourly_rate = 3;
  Availability availability = 4;
  string location = 5;
}

message CreateMyProfileResponse {
  bool success = 1;
  UserProfile profile = 2;
}

message GetMyProfileRequest {
  string user_id = 1;
}

message GetMyProfileResponse {
  UserProfile profile = 1;
  ProfileCompleteness completeness = 2;
}

message PatchMyProfileCoreInput {
  optional string display_name = 1;
  optional string language = 2;
  optional string contact_email = 3;
  optional string contact_phone = 4;
  optional string bio = 5;
}

message PatchMyClientProfileInput {
  optional string company_name = 1;
}

message PatchMyFreelancerProfileInput {
  optional string headline = 1;
  StringList skills = 2;
  optional double hourly_rate = 3;
  optional Availability availability = 4;
  optional string location = 5;
}

message PatchMyProfileRequest {
  string user_id = 1;
  PatchMyProfileCoreInput core = 2;

  oneof role_profile {
    PatchMyClientProfileInput client = 3;
    PatchMyFreelancerProfileInput freelancer = 4;
  }

  repeated string clear_fields = 5;
}

message PatchMyProfileResponse {
  UserProfile profile = 1;
  ProfileCompleteness completeness = 2;
}

message UserSettings {
  string ui_locale = 1;
  bool email_notifications_enabled = 2;
  bool push_notifications_enabled = 3;
}

message GetMySettingsRequest {
  string user_id = 1;
}

message GetMySettingsResponse {
  UserSettings settings = 1;
}

message PatchMySettingsRequest {
  string user_id = 1;
  optional string ui_locale = 2;
  optional bool email_notifications_enabled = 3;
  optional bool push_notifications_enabled = 4;
}

message PatchMySettingsResponse {
  UserSettings settings = 1;
}

message DeleteMyProfileRequest {
  string user_id = 1;
  bool hard_delete = 2;
}

message DeleteMyProfileResponse {
  bool deleted = 1;
}

message GetMyOnboardingStatusRequest {
  string user_id = 1;
}

message GetMyOnboardingStatusResponse {
  ProfileCompleteness completeness = 1;
  repeated OnboardingStep steps = 2;
}

message UploadMyAvatarRequest {
  string user_id = 1;
  string file_name = 2;
  string content_type = 3;
  bytes content = 4;
}

message UploadMyAvatarResponse {
  string avatar_url = 1;
  ProfileAvatar avatar = 2;
}

message GetMyAvatarRequest {
  string user_id = 1;
}

message GetMyAvatarResponse {
  ProfileAvatar avatar = 1;
  bytes content = 2;
}

message RemoveMyAvatarRequest {
  string user_id = 1;
}

message RemoveMyAvatarResponse {
  bool removed = 1;
}

message PortfolioMedia {
  int64 id = 1;
  PortfolioMediaType media_type = 2;
  string storage_key = 3;
  string external_url = 4;
  string file_name = 5;
  string content_type = 6;
  int64 size_bytes = 7;
  int32 width = 8;
  int32 height = 9;
  int64 created_at_unix = 10;
}

message PortfolioItem {
  int64 id = 1;
  string user_id = 2;
  string title = 3;
  string description = 4;
  string project_url = 5;
  string role_in_project = 6;
  optional int64 completed_at_unix = 7;
  repeated string tags = 8;
  repeated PortfolioMedia media = 9;
  int64 created_at_unix = 10;
  int64 updated_at_unix = 11;
  int32 sort_order = 13;
}

message CreateMyPortfolioItemRequest {
  string user_id = 1;
  string title = 2;         // max 50 chars.
  string description = 3;   // max 200 chars.
  string project_url = 4;
  string role_in_project = 5;
  optional int64 completed_at_unix = 6;
  repeated string tags = 7;
  repeated PortfolioMediaInput media = 8;
  optional int32 sort_order = 10;
}

message PortfolioMediaInput {
  PortfolioMediaType media_type = 1;
  string storage_key = 2;
  string external_url = 3;
  string file_name = 4;
  string content_type = 5;
  int64 size_bytes = 6;
  int32 width = 7;
  int32 height = 8;
}

message CreateMyPortfolioItemResponse {
  PortfolioItem item = 1;
}

message GetMyPortfolioItemRequest {
  string user_id = 1;
  int64 item_id = 2;
}

message GetMyPortfolioItemResponse {
  PortfolioItem item = 1;
}

message UpdateMyPortfolioItemRequest {
  string user_id = 1;
  int64 item_id = 2;
  optional string title = 3;
  optional string description = 4;
  optional string project_url = 5;
  optional string role_in_project = 6;
  optional int64 completed_at_unix = 7;
  StringList tags = 8;
  PortfolioMediaInputList media = 9;
  optional int32 sort_order = 11;
}

message PortfolioMediaInputList {
  repeated PortfolioMediaInput values = 1;
}

message UpdateMyPortfolioItemResponse {
  PortfolioItem item = 1;
}

message DeleteMyPortfolioItemRequest {
  string user_id = 1;
  int64 item_id = 2;
}

message DeleteMyPortfolioItemResponse {
  bool deleted = 1;
}

message ListMyPortfolioItemsRequest {
  string user_id = 1;
  PagingRequest page = 2;
}

message ListMyPortfolioItemsResponse {
  repeated PortfolioItem items = 1;
  PagingResponse page = 2;
}

message ListPublicPortfolioItemsRequest {
  string user_id = 1;
  PagingRequest page = 2;
}

message ListPublicPortfolioItemsResponse {
  repeated PortfolioItem items = 1;
  PagingResponse page = 2;
}

message Employment {
  int64 id = 1;
  string user_id = 2;
  string company_name = 3;
  string title = 4;
  string employment_type = 5;
  string location = 6;
  bool is_current = 7;
  int64 start_date_unix = 8;
  optional int64 end_date_unix = 9;
  string description = 10;
  int64 created_at_unix = 11;
  int64 updated_at_unix = 12;
  int32 sort_order = 14;
}

message CreateMyEmploymentRequest {
  string user_id = 1;
  string company_name = 2;
  string title = 3;
  string employment_type = 4;
  string location = 5;
  bool is_current = 6;
  int64 start_date_unix = 7;
  optional int64 end_date_unix = 8;
  string description = 9;
  optional int32 sort_order = 11;
}

message CreateMyEmploymentResponse {
  Employment employment = 1;
}

message GetMyEmploymentRequest {
  string user_id = 1;
  int64 employment_id = 2;
}

message GetMyEmploymentResponse {
  Employment employment = 1;
}

message UpdateMyEmploymentRequest {
  string user_id = 1;
  int64 employment_id = 2;
  optional string company_name = 3;
  optional string title = 4;
  optional string employment_type = 5;
  optional string location = 6;
  optional bool is_current = 7;
  optional int64 start_date_unix = 8;
  optional int64 end_date_unix = 9;
  optional string description = 10;
  optional int32 sort_order = 12;
}

message UpdateMyEmploymentResponse {
  Employment employment = 1;
}

message DeleteMyEmploymentRequest {
  string user_id = 1;
  int64 employment_id = 2;
}

message DeleteMyEmploymentResponse {
  bool deleted = 1;
}

message ListMyEmploymentRequest {
  string user_id = 1;
  PagingRequest page = 2;
}

message ListMyEmploymentResponse {
  repeated Employment employment = 1;
  PagingResponse page = 2;
}

message ListPublicEmploymentRequest {
  string user_id = 1;
  PagingRequest page = 2;
}

message ListPublicEmploymentResponse {
  repeated Employment employment = 1;
  PagingResponse page = 2;
}

message Education {
  int64 id = 1;
  string user_id = 2;
  string school_name = 3;
  string degree = 4;
  string field_of_study = 5;
  bool is_current = 6;
  optional int64 start_date_unix = 7;
  optional int64 end_date_unix = 8;
  string grade = 9;
  string description = 10;
  int64 created_at_unix = 11;
  int64 updated_at_unix = 12;
  int32 sort_order = 14;
}

message CreateMyEducationRequest {
  string user_id = 1;
  string school_name = 2;
  string degree = 3;
  string field_of_study = 4;
  bool is_current = 5;
  optional int64 start_date_unix = 6;
  optional int64 end_date_unix = 7;
  string grade = 8;
  string description = 9;
  optional int32 sort_order = 11;
}

message CreateMyEducationResponse {
  Education education = 1;
}

message GetMyEducationRequest {
  string user_id = 1;
  int64 education_id = 2;
}

message GetMyEducationResponse {
  Education education = 1;
}

message UpdateMyEducationRequest {
  string user_id = 1;
  int64 education_id = 2;
  optional string school_name = 3;
  optional string degree = 4;
  optional string field_of_study = 5;
  optional bool is_current = 6;
  optional int64 start_date_unix = 7;
  optional int64 end_date_unix = 8;
  optional string grade = 9;
  optional string description = 10;
  optional int32 sort_order = 12;
}

message UpdateMyEducationResponse {
  Education education = 1;
}

message DeleteMyEducationRequest {
  string user_id = 1;
  int64 education_id = 2;
}

message DeleteMyEducationResponse {
  bool deleted = 1;
}

message ListMyEducationRequest {
  string user_id = 1;
  PagingRequest page = 2;
}

message ListMyEducationResponse {
  repeated Education education = 1;
  PagingResponse page = 2;
}

message ListPublicEducationRequest {
  string user_id = 1;
  PagingRequest page = 2;
}

message ListPublicEducationResponse {
  repeated Education education = 1;
  PagingResponse page = 2;
}

message Certification {
  int64 id = 1;
  string user_id = 2;
  string name = 3;
  string issuing_organization = 4;
  string credential_id = 5;
  string credential_url = 6;
  optional int64 issue_date_unix = 7;
  optional int64 expiration_date_unix = 8;
  bool does_not_expire = 9;
  int64 created_at_unix = 10;
  int64 updated_at_unix = 11;
}

message CreateMyCertificationRequest {
  string user_id = 1;
  string name = 2;
  string issuing_organization = 3;
  string credential_id = 4;
  string credential_url = 5;
  optional int64 issue_date_unix = 6;
  optional int64 expiration_date_unix = 7;
  bool does_not_expire = 8;
}

message CreateMyCertificationResponse {
  Certification certification = 1;
}

message GetMyCertificationRequest {
  string user_id = 1;
  int64 certification_id = 2;
}

message GetMyCertificationResponse {
  Certification certification = 1;
}

message UpdateMyCertificationRequest {
  string user_id = 1;
  int64 certification_id = 2;
  optional string name = 3;
  optional string issuing_organization = 4;
  optional string credential_id = 5;
  optional string credential_url = 6;
  optional int64 issue_date_unix = 7;
  optional int64 expiration_date_unix = 8;
  optional bool does_not_expire = 9;
}

message UpdateMyCertificationResponse {
  Certification certification = 1;
}

message DeleteMyCertificationRequest {
  string user_id = 1;
  int64 certification_id = 2;
}

message DeleteMyCertificationResponse {
  bool deleted = 1;
}

message ListMyCertificationsRequest {
  string user_id = 1;
  PagingRequest page = 2;
}

message ListMyCertificationsResponse {
  repeated Certification certifications = 1;
  PagingResponse page = 2;
}

message ListPublicCertificationsRequest {
  string user_id = 1;
  PagingRequest page = 2;
}

message ListPublicCertificationsResponse {
  repeated Certification certifications = 1;
  PagingResponse page = 2;
}

message LanguageProficiency {
  string language_code = 1;
  LanguageProficiencyLevel proficiency = 2;
}

message UpsertMyLanguagesRequest {
  string user_id = 1;
  repeated LanguageProficiency languages = 2;
}

message UpsertMyLanguagesResponse {
  repeated LanguageProficiency languages = 1;
}

message GetMyLanguagesRequest {
  string user_id = 1;
}

message GetMyLanguagesResponse {
  repeated LanguageProficiency languages = 1;
}

message GetPublicLanguagesRequest {
  string user_id = 1;
}

message GetPublicLanguagesResponse {
  repeated LanguageProficiency languages = 1;
}

message AvailabilitySettings {
  Availability availability = 1;
  uint32 weekly_capacity_hours = 2;
}

message PatchMyAvailabilityRequest {
  string user_id = 1;
  optional Availability availability = 2;
  optional uint32 weekly_capacity_hours = 3;
}

message PatchMyAvailabilityResponse {
  AvailabilitySettings settings = 1;
}

message GetMyAvailabilityRequest {
  string user_id = 1;
}

message GetMyAvailabilityResponse {
  AvailabilitySettings settings = 1;
}

message RateSettings {
  double hourly_rate = 1;
}

message PatchMyRatesRequest {
  string user_id = 1;
  optional double hourly_rate = 2;
}

message PatchMyRatesResponse {
  RateSettings settings = 1;
}

message GetMyRatesRequest {
  string user_id = 1;
}

message GetMyRatesResponse {
  RateSettings settings = 1;
}

message WorkPreferences {
  string preferred_project_length = 1;
  double min_budget = 2;
  double max_budget = 3;
  repeated string contract_types = 4;
}

message PatchMyWorkPreferencesRequest {
  string user_id = 1;
  optional string preferred_project_length = 2;
  optional double min_budget = 3;
  optional double max_budget = 4;
  StringList contract_types = 5;
}

message PatchMyWorkPreferencesResponse {
  WorkPreferences settings = 1;
}

message GetMyWorkPreferencesRequest {
  string user_id = 1;
}

message GetMyWorkPreferencesResponse {
  WorkPreferences settings = 1;
}

message HiringPreferences {
  double min_hourly_rate = 1;
  double max_hourly_rate = 2;
  repeated string preferred_experience_levels = 3;
  repeated string preferred_locations = 4;
}

message GetMyHiringPreferencesRequest {
  string user_id = 1;
}

message GetMyHiringPreferencesResponse {
  HiringPreferences preferences = 1;
}

message PatchMyHiringPreferencesRequest {
  string user_id = 1;
  optional double min_hourly_rate = 2;
  optional double max_hourly_rate = 3;
  StringList preferred_experience_levels = 4;
  StringList preferred_locations = 5;
}

message PatchMyHiringPreferencesResponse {
  HiringPreferences preferences = 1;
}

message SavedFreelancer {
  string freelancer_user_id = 1;
  int64 saved_at_unix = 2;
}

message SaveFreelancerRequest {
  string user_id = 1;
  string freelancer_user_id = 2;
}

message SaveFreelancerResponse {
  SavedFreelancer saved = 1;
}

message ListSavedFreelancersRequest {
  string user_id = 1;
  PagingRequest page = 2;
}

message ListSavedFreelancersResponse {
  repeated SavedFreelancer freelancers = 1;
  PagingResponse page = 2;
}

message RemoveSavedFreelancerRequest {
  string user_id = 1;
  string freelancer_user_id = 2;
}

message RemoveSavedFreelancerResponse {
  bool removed = 1;
}

message FreelancerNote {
  string freelancer_user_id = 1;
  string note = 2; // max 100 chars.
  int64 updated_at_unix = 3;
}

message UpsertFreelancerNoteRequest {
  string user_id = 1;
  string freelancer_user_id = 2;
  string note = 3;
}

message UpsertFreelancerNoteResponse {
  FreelancerNote note = 1;
}

message GetFreelancerNoteRequest {
  string user_id = 1;
  string freelancer_user_id = 2;
}

message GetFreelancerNoteResponse {
  FreelancerNote note = 1;
}

message GetPublicProfileRequest {
  string user_id = 1;
}

message GetPublicProfileResponse {
