syntax = "proto3";

package user.v1;
option go_package = "jobconnect/user/gen/user;userv1";

service UserService {
  // Self endpoints.
  rpc CreateMyProfile(CreateMyProfileRequest) returns (CreateMyProfileResponse);
  rpc GetMyProfile(GetMyProfileRequest) returns (GetMyProfileResponse);
  rpc PatchMyProfile(PatchMyProfileRequest) returns (PatchMyProfileResponse);
  rpc DeleteMyProfile(DeleteMyProfileRequest) returns (DeleteMyProfileResponse);
  rpc GetMyOnboardingStatus(GetMyOnboardingStatusRequest)
      returns (GetMyOnboardingStatusResponse);
  rpc GetMySettings(GetMySettingsRequest) returns (GetMySettingsResponse);
  rpc PatchMySettings(PatchMySettingsRequest)
    returns (PatchMySettingsResponse);

  rpc UpsertMyAvatar(UploadMyAvatarRequest) returns (UploadMyAvatarResponse);
  rpc GetMyAvatar(GetMyAvatarRequest) returns (GetMyAvatarResponse);
  rpc RemoveMyAvatar(RemoveMyAvatarRequest) returns (RemoveMyAvatarResponse);

  rpc UpsertMyCV(UploadMyCVRequest) returns (UploadMyCVResponse);
  rpc GetMyCV(GetMyCVRequest) returns (GetMyCVResponse);
  rpc RemoveMyCV(RemoveMyCVRequest) returns (RemoveMyCVResponse);

  rpc CreateMyPortfolioItem(CreateMyPortfolioItemRequest)
      returns (CreateMyPortfolioItemResponse);
  rpc GetMyPortfolioItem(GetMyPortfolioItemRequest)
      returns (GetMyPortfolioItemResponse);
  rpc UpdateMyPortfolioItem(UpdateMyPortfolioItemRequest)
      returns (UpdateMyPortfolioItemResponse);
  rpc DeleteMyPortfolioItem(DeleteMyPortfolioItemRequest)
      returns (DeleteMyPortfolioItemResponse);
  rpc ListMyPortfolioItems(ListMyPortfolioItemsRequest)
      returns (ListMyPortfolioItemsResponse);

  rpc PatchMyWorkPreferences(PatchMyWorkPreferencesRequest)
      returns (PatchMyWorkPreferencesResponse);
  rpc GetMyWorkPreferences(GetMyWorkPreferencesRequest)
      returns (GetMyWorkPreferencesResponse);

  rpc GetMyHiringPreferences(GetMyHiringPreferencesRequest)
      returns (GetMyHiringPreferencesResponse);
  rpc PatchMyHiringPreferences(PatchMyHiringPreferencesRequest)
      returns (PatchMyHiringPreferencesResponse);
      
  rpc SaveFreelancer(SaveFreelancerRequest) returns (SaveFreelancerResponse);
  rpc ListSavedFreelancers(ListSavedFreelancersRequest)
      returns (ListSavedFreelancersResponse);
  rpc RemoveSavedFreelancer(RemoveSavedFreelancerRequest)
      returns (RemoveSavedFreelancerResponse);
  rpc UpsertFreelancerNote(UpsertFreelancerNoteRequest)
      returns (UpsertFreelancerNoteResponse);
  rpc GetFreelancerNote(GetFreelancerNoteRequest)
      returns (GetFreelancerNoteResponse);
}

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_CLIENT = 1;
  USER_ROLE_FREELANCER = 2;
  USER_ROLE_ADMIN = 3;
}

enum AccountStatus {
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  ACCOUNT_STATUS_ACTIVE = 1;
  ACCOUNT_STATUS_SUSPENDED = 2;
  ACCOUNT_STATUS_DELETED = 3;
}

enum VerificationStatus {
  VERIFICATION_STATUS_UNSPECIFIED = 0;
  VERIFICATION_STATUS_PENDING = 1;
  VERIFICATION_STATUS_SUBMITTED = 5;
  VERIFICATION_STATUS_VERIFIED = 2;
  VERIFICATION_STATUS_REJECTED = 3;
  VERIFICATION_STATUS_EXPIRED = 4;
}

enum Availability {
  AVAILABILITY_UNSPECIFIED = 0;
  AVAILABILITY_FULL_TIME = 1;
  AVAILABILITY_PART_TIME = 2;
  AVAILABILITY_AS_NEEDED = 3;
  AVAILABILITY_UNAVAILABLE = 4;
}

// ProjectLength captures a freelancer's preferred engagement duration.
enum ProjectLength {
  // No preference selected by the user.
  PROJECT_LENGTH_UNSPECIFIED = 0;
  // Short-term engagements: up to 4 weeks.
  PROJECT_LENGTH_SHORT_TERM = 1;
  // Medium-term engagements: 1 to 3 months.
  PROJECT_LENGTH_MEDIUM_TERM = 2;
  // Long-term engagements: over 3 months.
  PROJECT_LENGTH_LONG_TERM = 3;
}

enum PortfolioMediaType {
  PORTFOLIO_MEDIA_TYPE_UNSPECIFIED = 0;
  PORTFOLIO_MEDIA_TYPE_IMAGE = 1;
  PORTFOLIO_MEDIA_TYPE_VIDEO = 2;
  PORTFOLIO_MEDIA_TYPE_FILE = 3;
  PORTFOLIO_MEDIA_TYPE_LINK = 4;
}



enum OnboardingStepStatus {
  ONBOARDING_STEP_STATUS_UNSPECIFIED = 0;
  ONBOARDING_STEP_STATUS_NOT_STARTED = 1;
  ONBOARDING_STEP_STATUS_COMPLETED = 2;
}

message StringList {
  repeated string values = 1;
}

message PagingRequest {
  uint32 page_size = 1;
  string page_token = 2;
}

message PagingResponse {
  string next_page_token = 1;
}

message UserCore {
  int64 profile_id = 1;
  string user_id = 2;
  UserRole role = 3;
  string first_name = 4;
  string last_name = 5;
  string display_name = 6;
  string avatar_url = 7;
  string contact_email = 9;
  string contact_phone = 10;
  string bio = 11;
  AccountStatus account_status = 12;
  string suspension_reason = 13;
  string tax_id = 15;
  VerificationStatus verification_status = 16;
  int64 created_at_unix = 17;
  int64 updated_at_unix = 18;
  optional int64 deleted_at_unix = 19;
  string location = 20;
}

message ClientProfile {
  string company_name = 1;
}

message FreelancerMetrics {
  double rating = 1;
  double job_success_score = 2;
  uint32 total_reviews = 3;
  uint32 total_jobs = 4;
  double total_earnings = 5;
  optional int64 last_active_at_unix = 6;
}

message FreelancerProfile {
  string headline = 1;
  repeated string skills = 2;
  double hourly_rate = 3;
  Availability availability = 4;
  FreelancerMetrics metrics = 5;
}

message ProfileAvatar {
  string user_id = 1;
  string file_name = 2;
  string content_type = 3;
  string storage_key = 4;
  int64 size_bytes = 5;
  int32 width = 6;
  int32 height = 7;
  int64 updated_at_unix = 8;
}

message UserProfile {
  UserCore core = 1;
  ClientProfile client = 2;
  FreelancerProfile freelancer = 3;
  CapabilityFlags capabilities = 4;
}

message CapabilityFlags {
  bool can_apply_jobs = 1;
  bool can_post_jobs = 2;
  bool can_withdraw_funds = 3;
  bool can_message = 4;
  bool can_be_discovered = 5;
}

message ProfileCompleteness {
  uint32 percent = 1;
  repeated string missing_required_fields = 2;
}

message ProfileReadiness {
  uint32 percent = 1;
  repeated string missing_required_fields = 2;
  repeated string recommendations = 3;
}

message OnboardingStep {
  string key = 1;
  OnboardingStepStatus status = 2;
}

message CreateMyProfileRequest {
  string user_id = 1;
  UserRole role = 2;
  string first_name = 3;
  string last_name = 4;
  string display_name = 5;
  string location = 6;
  string contact_email = 7;

  oneof role_profile {
    ClientProfileCreateInput client = 8;
    FreelancerProfileCreateInput freelancer = 9;
  }
}

message ClientProfileCreateInput {
  string company_name = 1;
}

message FreelancerProfileCreateInput {
  string headline = 1;
  repeated string skills = 2;
  double hourly_rate = 3;
  Availability availability = 4;
}

message CreateMyProfileResponse {
  bool success = 1;
  UserProfile profile = 2;
}

message GetMyProfileRequest {
  string user_id = 1;
}

message GetMyProfileResponse {
  UserProfile profile = 1;
  ProfileCompleteness completeness = 2;
}

message PatchMyProfileCoreInput {
  optional string display_name = 1;
  optional string contact_email = 3;
  optional string contact_phone = 4;
  optional string bio = 5;
  optional string tax_id = 6;
  optional string location = 7;
}

message PatchMyClientProfileInput {
  optional string company_name = 1;
}

message PatchMyFreelancerProfileInput {
  optional string headline = 1;
  StringList skills = 2;
  optional double hourly_rate = 3;
  optional Availability availability = 4;
}

message PatchMyProfileRequest {
  string user_id = 1;
  PatchMyProfileCoreInput core = 2;

  oneof role_profile {
    PatchMyClientProfileInput client = 3;
    PatchMyFreelancerProfileInput freelancer = 4;
  }

  repeated string clear_fields = 5;
}

message PatchMyProfileResponse {
  UserProfile profile = 1;
  ProfileCompleteness completeness = 2;
}

message UserSettings {
  string ui_locale = 1;
  bool email_notifications_enabled = 2;
  bool push_notifications_enabled = 3;
}

message GetMySettingsRequest {
  string user_id = 1;
}

message GetMySettingsResponse {
  UserSettings settings = 1;
}

message PatchMySettingsRequest {
  string user_id = 1;
  optional string ui_locale = 2;
  optional bool email_notifications_enabled = 3;
  optional bool push_notifications_enabled = 4;
}

message PatchMySettingsResponse {
  UserSettings settings = 1;
}

message DeleteMyProfileRequest {
  string user_id = 1;
  bool hard_delete = 2;
}

message DeleteMyProfileResponse {
  bool deleted = 1;
}

message GetMyOnboardingStatusRequest {
  string user_id = 1;
}

message GetMyOnboardingStatusResponse {
  ProfileCompleteness completeness = 1;
  repeated OnboardingStep steps = 2;
  ProfileReadiness readiness = 3;
}

message UploadMyAvatarRequest {
  string user_id = 1;
  string file_name = 2;
  string content_type = 3;
  bytes content = 4;
}

message UploadMyAvatarResponse {
  string avatar_url = 1;
  ProfileAvatar avatar = 2;
}

message GetMyAvatarRequest {
  string user_id = 1;
}

message GetMyAvatarResponse {
  ProfileAvatar avatar = 1;
  bytes content = 2;
}

message RemoveMyAvatarRequest {
  string user_id = 1;
}

message RemoveMyAvatarResponse {
  bool removed = 1;
}

message ProfileCV {
  string user_id = 1;
  string file_name = 2;
  string content_type = 3;
  int64 size_bytes = 4;
  int64 updated_at_unix = 5;
  string download_url = 6;
}

message UploadMyCVRequest {
  string user_id = 1;
  string file_name = 2;
  string content_type = 3;
  bytes content = 4;
}

message UploadMyCVResponse {
  ProfileCV cv = 1;
}

message GetMyCVRequest {
  string user_id = 1;
}

message GetMyCVResponse {
  ProfileCV cv = 1;
}

message RemoveMyCVRequest {
  string user_id = 1;
}

message RemoveMyCVResponse {
  bool removed = 1;
}

message PortfolioMedia {
  int64 id = 1;
  PortfolioMediaType media_type = 2;
  // MinIO object key for IMAGE/VIDEO/FILE media.
  string storage_key = 3;
  // External URL used for LINK media.
  string external_url = 4;
  string file_name = 5;
  string content_type = 6;
  int64 size_bytes = 7;
  int32 width = 8;
  int32 height = 9;
  int64 created_at_unix = 10;
}

message PortfolioItem {
  int64 id = 1;
  string user_id = 2;
  string title = 3;
  string description = 4;
  string project_url = 5;
  string role_in_project = 6;
  optional int64 completed_at_unix = 7;
  repeated string tags = 8;
  repeated PortfolioMedia media = 9;
  int64 created_at_unix = 10;
  int64 updated_at_unix = 11;
  reserved 13;
}

message CreateMyPortfolioItemRequest {
  string user_id = 1;
  string title = 2;         // max 50 chars.
  string description = 3;   // max 200 chars.
  string project_url = 4;
  string role_in_project = 5;
  optional int64 completed_at_unix = 6;
  repeated string tags = 7;
  repeated PortfolioMediaInput media = 8;
  reserved 10;
}

message PortfolioMediaInput {
  PortfolioMediaType media_type = 1;
  // Required for IMAGE/VIDEO/FILE uploads.
  string storage_key = 2;
  // Required for LINK media.
  string external_url = 3;
  string file_name = 4;
  string content_type = 5;
  int64 size_bytes = 6;
  int32 width = 7;
  int32 height = 8;
}

message CreateMyPortfolioItemResponse {
  PortfolioItem item = 1;
}

message GetMyPortfolioItemRequest {
  string user_id = 1;
  int64 item_id = 2;
}

message GetMyPortfolioItemResponse {
  PortfolioItem item = 1;
}

message UpdateMyPortfolioItemRequest {
  string user_id = 1;
  int64 item_id = 2;
  optional string title = 3;
  optional string description = 4;
  optional string project_url = 5;
  optional string role_in_project = 6;
  optional int64 completed_at_unix = 7;
  StringList tags = 8;
  PortfolioMediaInputList media = 9;
  reserved 11;
}

message PortfolioMediaInputList {
  repeated PortfolioMediaInput values = 1;
}

message UpdateMyPortfolioItemResponse {
  PortfolioItem item = 1;
}

message DeleteMyPortfolioItemRequest {
  string user_id = 1;
  int64 item_id = 2;
}

message DeleteMyPortfolioItemResponse {
  bool deleted = 1;
}

message ListMyPortfolioItemsRequest {
  string user_id = 1;
  PagingRequest page = 2;
}

message ListMyPortfolioItemsResponse {
  repeated PortfolioItem items = 1;
  PagingResponse page = 2;
}

message WorkPreferences {
  ProjectLength preferred_project_length = 1;
  double min_budget = 2;
  double max_budget = 3;
  repeated string contract_types = 4;
  uint32 weekly_capacity_hours = 5;
}

message PatchMyWorkPreferencesRequest {
  string user_id = 1;
  optional ProjectLength preferred_project_length = 2;
  optional double min_budget = 3;
  optional double max_budget = 4;
  StringList contract_types = 5;
  optional uint32 weekly_capacity_hours = 6;
}

message PatchMyWorkPreferencesResponse {
  WorkPreferences settings = 1;
}

message GetMyWorkPreferencesRequest {
  string user_id = 1;
}

message GetMyWorkPreferencesResponse {
  WorkPreferences settings = 1;
}

message HiringPreferences {
  double min_hourly_rate = 1;
  double max_hourly_rate = 2;
  reserved 3;
  repeated string preferred_locations = 4;
}

message GetMyHiringPreferencesRequest {
  string user_id = 1;
}

message GetMyHiringPreferencesResponse {
  HiringPreferences preferences = 1;
}

message PatchMyHiringPreferencesRequest {
  string user_id = 1;
  optional double min_hourly_rate = 2;
  optional double max_hourly_rate = 3;
  reserved 4;
  StringList preferred_locations = 5;
}

message PatchMyHiringPreferencesResponse {
  HiringPreferences preferences = 1;
}

message SavedFreelancer {
  string freelancer_user_id = 1;
  int64 saved_at_unix = 2;
}

message SaveFreelancerRequest {
  string user_id = 1;
  string freelancer_user_id = 2;
}

message SaveFreelancerResponse {
  SavedFreelancer saved = 1;
}

message ListSavedFreelancersRequest {
  string user_id = 1;
  PagingRequest page = 2;
}

message ListSavedFreelancersResponse {
  repeated SavedFreelancer freelancers = 1;
  PagingResponse page = 2;
}

message RemoveSavedFreelancerRequest {
  string user_id = 1;
  string freelancer_user_id = 2;
}

message RemoveSavedFreelancerResponse {
  bool removed = 1;
}

message FreelancerNote {
  string freelancer_user_id = 1;
  string note = 2; // max 100 chars.
  int64 updated_at_unix = 3;
}

message UpsertFreelancerNoteRequest {
  string user_id = 1;
  string freelancer_user_id = 2;
  string note = 3;
}

message UpsertFreelancerNoteResponse {
  FreelancerNote note = 1;
}

message GetFreelancerNoteRequest {
  string user_id = 1;
  string freelancer_user_id = 2;
}

message GetFreelancerNoteResponse {
  FreelancerNote note = 1;
}

