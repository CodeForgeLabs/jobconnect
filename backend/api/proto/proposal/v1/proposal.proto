syntax = "proto3";

package proposal.v1;

option go_package = "jobconnect/proposal/gen/proposal/v1;proposalv1";

service ProposalService {
  rpc SubmitProposal(SubmitProposalRequest) returns (SubmitProposalResponse);
  rpc ModifyProposal(ModifyProposalRequest) returns (ModifyProposalResponse);
  rpc WithdrawProposal(WithdrawProposalRequest) returns (WithdrawProposalResponse);
  rpc GetProposal(GetProposalRequest) returns (GetProposalResponse);
  rpc GetMyProposalForJob(GetMyProposalForJobRequest) returns (GetMyProposalForJobResponse);
  rpc HasAppliedToJob(HasAppliedToJobRequest) returns (HasAppliedToJobResponse);
  rpc ListProposalsByJob(ListProposalsByJobRequest) returns (ListProposalsByJobResponse);
  rpc ListMyProposals(ListMyProposalsRequest) returns (ListMyProposalsResponse);
  rpc ListClientProposals(ListClientProposalsRequest) returns (ListClientProposalsResponse);
  rpc CountProposalsByJob(CountProposalsByJobRequest) returns (CountProposalsByJobResponse);
  rpc CountClientProposalInbox(CountClientProposalInboxRequest) returns (CountClientProposalInboxResponse);
  rpc GetProposalAttachmentUploadUrl(GetProposalAttachmentUploadUrlRequest) returns (GetProposalAttachmentUploadUrlResponse);
  rpc GetProposalAttachmentDownloadUrl(GetProposalAttachmentDownloadUrlRequest) returns (GetProposalAttachmentDownloadUrlResponse);
  rpc SetProposalStatus(SetProposalStatusRequest) returns (SetProposalStatusResponse);
  rpc InternalMarkProposalOfferSent(InternalMarkProposalOfferSentRequest) returns (InternalMarkProposalOfferSentResponse);
  rpc InternalHireProposal(InternalHireProposalRequest) returns (InternalHireProposalResponse);
  rpc InternalReleaseHiredProposal(InternalReleaseHiredProposalRequest) returns (InternalReleaseHiredProposalResponse);
}

enum ProposalStatus {
  PROPOSAL_STATUS_UNSPECIFIED = 0;
  PROPOSAL_STATUS_SENT = 1;
  PROPOSAL_STATUS_SHORTLISTED = 2;
  PROPOSAL_STATUS_REJECTED = 3;
  PROPOSAL_STATUS_HIRED = 4;
  PROPOSAL_STATUS_WITHDRAWN = 5;
  PROPOSAL_STATUS_OFFER_SENT = 6;
}

enum SortBy {
  SORT_BY_UNSPECIFIED = 0;
  SORT_BY_NEWEST = 1;
  SORT_BY_OLDEST = 2;
  SORT_BY_BID_HIGH = 3;
  SORT_BY_BID_LOW = 4;
}

enum ClientDecision {
  CLIENT_DECISION_UNSPECIFIED = 0;
  CLIENT_DECISION_SHORTLISTED = 1;
  CLIENT_DECISION_REJECTED = 2;
}

message ProposalAttachment {
  int64 id = 1;
  string file_name = 2;
  string content_type = 3;
  string url = 4;
  int64 size_bytes = 5;
  string storage_key = 6;
}

message Proposal {
  int64 id = 1;
  int64 job_id = 2;
  string client_id = 3;
  string freelancer_id = 4;
  string cover_letter = 5;
  string bid_type = 6; // fixed | hourly
  double bid_amount = 7;
  int32 estimated_days = 8;
  repeated ProposalAttachment attachments = 9;
  ProposalStatus status = 10;
  string status_reason = 11;
  int64 created_at_unix_seconds = 12;
  int64 updated_at_unix_seconds = 13;
  int64 shortlisted_at_unix_seconds = 14;
  int64 rejected_at_unix_seconds = 15;
  int64 hired_at_unix_seconds = 16;
  int64 withdrawn_at_unix_seconds = 17;
  int32 connects_spent = 18;
  int64 offer_sent_at_unix_seconds = 19;
}

message SubmitProposalRequest {
  int64 job_id = 1;
  string cover_letter = 2;
  string bid_type = 3;
  double bid_amount = 4;
  int32 estimated_days = 5;
  repeated ProposalAttachment attachments = 6;
  int32 connects_spent = 7;
}

message SubmitProposalResponse {
  Proposal proposal = 1;
}

message ModifyProposalRequest {
  int64 proposal_id = 1;
  string cover_letter = 2;
  double bid_amount = 3;
  int32 estimated_days = 4;
  repeated ProposalAttachment attachments = 5;
}

message ModifyProposalResponse {
  Proposal proposal = 1;
}

message WithdrawProposalRequest {
  int64 proposal_id = 1;
  string reason = 2;
}

message WithdrawProposalResponse {
  bool withdrawn = 1;
}

message GetProposalRequest {
  int64 proposal_id = 1;
}

message GetProposalResponse {
  Proposal proposal = 1;
}

message GetMyProposalForJobRequest {
  int64 job_id = 1;
}

message GetMyProposalForJobResponse {
  Proposal proposal = 1;
}

message HasAppliedToJobRequest {
  int64 job_id = 1;
}

message HasAppliedToJobResponse {
  bool has_applied = 1;
  int64 proposal_id = 2;
  ProposalStatus active_status = 3;
}

message ListProposalsByJobRequest {
  int64 job_id = 1;
  repeated ProposalStatus status_filter = 2;
  optional string freelancer_id_filter = 3;
  SortBy sort_by = 4;
  int32 page_size = 5;
  string page_token = 6;
}

message ListProposalsByJobResponse {
  repeated Proposal proposals = 1;
  string next_page_token = 2;
}

message ListMyProposalsRequest {
  repeated ProposalStatus status_filter = 1;
  optional int64 job_id_filter = 2;
  SortBy sort_by = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message ListMyProposalsResponse {
  repeated Proposal proposals = 1;
  string next_page_token = 2;
}

message ListClientProposalsRequest {
  repeated ProposalStatus status_filter = 1;
  optional int64 job_id_filter = 2;
  optional string freelancer_id_filter = 3;
  SortBy sort_by = 4;
  int32 page_size = 5;
  string page_token = 6;
}

message ListClientProposalsResponse {
  repeated Proposal proposals = 1;
  string next_page_token = 2;
}

message ProposalStatusCount {
  ProposalStatus status = 1;
  int64 count = 2;
}

message CountProposalsByJobRequest {
  int64 job_id = 1;
}

message CountProposalsByJobResponse {
  int64 total = 1;
  repeated ProposalStatusCount by_status = 2;
}

message CountClientProposalInboxRequest {
  repeated ProposalStatus status_filter = 1;
}

message CountClientProposalInboxResponse {
  int64 total = 1;
  repeated ProposalStatusCount by_status = 2;
}

message InternalMarkProposalOfferSentRequest {
  int64 proposal_id = 1;
  string client_id = 2;
  string note = 3;
}

message InternalMarkProposalOfferSentResponse {
  Proposal proposal = 1;
}

message InternalHireProposalRequest {
  int64 proposal_id = 1;
  string client_id = 2;
  string request_id = 3;
  string note = 4;
}

message InternalHireProposalResponse {
  Proposal proposal = 1;
  bool reused_idempotent_result = 2;
}

message InternalReleaseHiredProposalRequest {
  int64 proposal_id = 1;
  string client_id = 2;
  string reason = 3;
}

message InternalReleaseHiredProposalResponse {
  Proposal proposal = 1;
}

message GetProposalAttachmentUploadUrlRequest {
  int64 proposal_id = 1;
  string file_name = 2;
  string content_type = 3;
}

message GetProposalAttachmentUploadUrlResponse {
  string storage_key = 1;
  string upload_url = 2;
}

message GetProposalAttachmentDownloadUrlRequest {
  int64 proposal_id = 1;
  int64 attachment_id = 2;
}

message GetProposalAttachmentDownloadUrlResponse {
  string download_url = 1;
}

message SetProposalStatusRequest {
  int64 proposal_id = 1;
  ClientDecision decision = 2; // shortlisted | rejected
  string reason = 3;
}

message SetProposalStatusResponse {
  Proposal proposal = 1;
}
