host: localhost:8080
info:
  contact:
    email: support@jobconnect.com
    name: API Support
  description: API Gateway for JobConnect platform.
  license:
    name: MIT
  termsOfService: http://example.com/terms/
  title: JobConnect Gateway API
  version: '1.0'
paths:
  /api/v1/auth/challenge:
    post:
      consumes:
      - application/json
      description: Verifies the CAPTCHA response and returns a short-lived challenge
        proof.
      parameters:
      - description: Challenge payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.challengeRequest'
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/handlers.ChallengeResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '503':
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
      summary: Create challenge proof
      tags:
      - Auth
  /api/v1/auth/email-change/confirm:
    post:
      consumes:
      - application/json
      description: Confirms the email change using the OTP sent to the new address.
      parameters:
      - description: Email change confirmation
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.confirmEmailChangeRequest'
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/handlers.ConfirmEmailChangeResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
      security:
      - BearerAuth: []
      summary: Confirm email change
      tags:
      - Auth
  /api/v1/auth/email-change/request:
    post:
      consumes:
      - application/json
      description: Sends an OTP to the new email address for verification.
      parameters:
      - description: Email change request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.requestEmailChangeRequest'
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/handlers.RequestEmailChangeResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
      security:
      - BearerAuth: []
      summary: Request email change
      tags:
      - Auth
  /api/v1/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a password reset OTP to the account email.
      parameters:
      - description: Forgot password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.forgotPasswordRequest'
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/handlers.ForgotPasswordResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
      summary: Start password reset
      tags:
      - Auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and sets the refresh cookie.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
      summary: Login
      tags:
      - Auth
  /api/v1/auth/logout-everywhere:
    post:
      description: Revokes all refresh sessions for the current account.
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/handlers.LogoutEverywhereResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
      summary: Logout from all sessions
      tags:
      - Auth
  /api/v1/auth/oauth/{provider}/callback:
    get:
      description: Handles the OAuth callback and issues access/refresh tokens.
      parameters:
      - description: OAuth provider
        enum:
        - google
        - github
        in: path
        name: provider
        required: true
        type: string
      - description: OAuth state
        in: query
        name: state
        required: true
        type: string
      - description: OAuth authorization code
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/handlers.OAuthCallbackResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
      summary: Complete OAuth login
      tags:
      - Auth
  /api/v1/auth/oauth/{provider}/start:
    get:
      description: Redirects the client to the OAuth provider authorization page.
      parameters:
      - description: OAuth provider
        enum:
        - google
        - github
        in: path
        name: provider
        required: true
        type: string
      - description: Desired role
        in: query
        name: role
        type: string
      produces:
      - application/json
      responses:
        '302':
          description: Redirect to provider authorization URL
          schema:
            type: string
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
      summary: Start OAuth login
      tags:
      - Auth
  /api/v1/auth/refresh:
    post:
      description: Exchanges the refresh cookie for a new access token.
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/handlers.RefreshResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new account and sends an email OTP for verification.
      parameters:
      - description: Register payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.registerRequest'
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/handlers.RegisterResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
      summary: Register a new account
      tags:
      - Auth
  /api/v1/auth/reset-password:
    post:
      consumes:
      - application/json
      description: Resets the password using the OTP sent to email.
      parameters:
      - description: Reset password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.resetPasswordRequest'
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/handlers.ResetPasswordResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
      summary: Reset password
      tags:
      - Auth
  /api/v1/auth/sessions:
    get:
      description: Returns active login sessions for the authenticated user.
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/handlers.ListSessionsResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
      security:
      - BearerAuth: []
      summary: List sessions
      tags:
      - Auth
  /api/v1/auth/sessions/{sessionId}:
    delete:
      description: Revokes a specific session for the authenticated user.
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/handlers.RevokeSessionResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke session
      tags:
      - Auth
  /api/v1/auth/verify-email-otp:
    post:
      consumes:
      - application/json
      description: Verifies the email OTP sent during registration.
      parameters:
      - description: Email verification payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.verifyEmailOTPRequest'
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/handlers.VerifyEmailOTPResponse'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.AuthErrorResponse'
      summary: Verify email OTP
