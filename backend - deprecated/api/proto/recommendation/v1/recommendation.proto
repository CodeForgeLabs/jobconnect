syntax = "proto3";

package recommendation.v1;

option go_package = "jobconnect/recommendation/gen/recommendation/v1;recommendationv1";

service RecommendationService {
  // GetRecommendedJobs returns a list of jobs tailored for a specific freelancer
  rpc GetRecommendedJobs(GetRecommendedJobsRequest) returns (GetRecommendedJobsResponse);

  // GetRecommendedFreelancers returns a list of freelancers best suited for a specific job
  rpc GetRecommendedFreelancers(GetRecommendedFreelancersRequest) returns (GetRecommendedFreelancersResponse);

  // InvalidateRecommendationCache clears cached recommendation entries after upstream changes.
  rpc InvalidateRecommendationCache(InvalidateRecommendationCacheRequest) returns (InvalidateRecommendationCacheResponse);
}

message GetRecommendedJobsRequest {
  string user_id = 1; // The freelancer's UUID
  int32 limit = 2;    // Number of recommendations to return
}

message JobRecommendation {
  int64 job_id = 1;
  float match_score = 2;      // 0.0 to 1.0 based on skill overlap and ratings
  string match_reason = 3;    // e.g., "Matches your 'Go' and 'gRPC' skills"
}

message GetRecommendedJobsResponse {
  repeated JobRecommendation recommendations = 1;
}

message GetRecommendedFreelancersRequest {
  int64 job_id = 1;
  int32 limit = 2;
}

message FreelancerRecommendation {
  string user_id = 1;
  float match_score = 2;
  string match_reason = 3;    // e.g., "Top rated in 'Backend Development'"
}

message GetRecommendedFreelancersResponse {
  repeated FreelancerRecommendation recommendations = 1;
}

message InvalidateRecommendationCacheRequest {
  repeated string user_ids = 1; // Job recommendation caches for these freelancers/users
  repeated int64 job_ids = 2;   // Freelancer recommendation caches for these jobs
  bool all = 3;                 // Clear all recommendation cache entries
}

message InvalidateRecommendationCacheResponse {
  int64 deleted_entries = 1;
}
