syntax = "proto3";

package wallet.v1;

option go_package = "jobconnect/wallet/gen/wallet/v1;walletv1";

// ==================== SERVICE ====================

service WalletService {
  rpc CreateWallet(CreateWalletRequest) returns (CreateWalletResponse);
  rpc GetWallet(GetWalletRequest) returns (GetWalletResponse);

  rpc CreateDepositTransaction(CreateDepositTransactionRequest)
      returns (CreateDepositTransactionResponse);

  rpc CompleteDeposit(CompleteDepositRequest)
      returns (CompleteDepositResponse);

  rpc GetTransaction(GetTransactionRequest)
      returns (GetTransactionResponse);

  rpc FetchWalletTransactions(FetchWalletTransactionsRequest)
    returns (FetchWalletTransactionsResponse);
  
}
message FetchWalletTransactionsRequest {
  int64 wallet_id = 1;
}
message FetchWalletTransactionsResponse {
  repeated WalletTransaction transactions = 1;
}
// ==================== ENUMS ====================

enum TransactionStatus {
  TRANSACTION_STATUS_UNSPECIFIED = 0;
  TRANSACTION_STATUS_PENDING = 1;
  TRANSACTION_STATUS_SUCCESS = 2;
  TRANSACTION_STATUS_FAILED = 3;
}

enum TransactionType {
  TRANSACTION_TYPE_UNSPECIFIED = 0;
  TRANSACTION_TYPE_DEPOSIT = 1;
  TRANSACTION_TYPE_WITHDRAWAL = 2;
  TRANSACTION_TYPE_PAYMENT = 3;
}

// ==================== MODELS ====================

message Wallet {
  int64 id = 1;
  string owner_id = 2;
  int64 balance_minor = 3;
  int64 created_at_unix_seconds = 4;
}

message WalletTransaction {
  int64 id = 1;
  int64 wallet_id = 2;
  string tx_ref = 3;
  string chapa_ref = 4;
  int64 amount_minor = 5;
  TransactionType tx_type = 6;
  string description = 7;
  TransactionStatus status = 8;
  int64 created_at_unix_seconds = 9;
}

// ==================== WALLET ====================

message CreateWalletRequest {
  string owner_id = 1;
}

message CreateWalletResponse {
  Wallet wallet = 1;
}

message GetWalletRequest {
  string owner_id = 1;
}

message GetWalletResponse {
  Wallet wallet = 1;
}

// ==================== DEPOSIT ====================

message CreateDepositTransactionRequest {
  int64 wallet_id = 1;
  int64 amount_minor = 2;
  string description = 3;
  string phone_number = 4;
  string email = 5;
}

message CreateDepositTransactionResponse {
  WalletTransaction transaction = 1;
  string payment_url = 2; 
}

message CompleteDepositRequest {
  string tx_ref = 1;
  string chapa_ref = 2;
}

message CompleteDepositResponse {
  bool success = 1;
}

// ==================== TRANSACTION LOOKUP ====================

message GetTransactionRequest {
  string tx_ref = 1;
}

message GetTransactionResponse {
  WalletTransaction transaction = 1;
}